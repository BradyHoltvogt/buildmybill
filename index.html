/* ═══════════════════════════════════════════════════════════════════════════
   BuildMyBill — single-file React app. Sections are marked with banners.
   ═══════════════════════════════════════════════════════════════════════════ */

const { useState, useEffect, useRef, useMemo, createContext, useContext } = React;

/* ─── Supabase client ────────────────────────────────────────────────────── */
const CFG = window.BMB_CONFIG || {};
const supa = window.supabase.createClient(CFG.url, CFG.anonKey, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
});

// Transient client-only ids (React keys, line items) — never hit the DB.
const genId = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
// Real UUID for DB rows, generated client-side so optimistic updates keep a stable id.
function uuid() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// Small localStorage helper — used ONLY for per-browser UI prefs (never company data).
const storage = {
  get(key) { try { return localStorage.getItem(key); } catch { return null; } },
  set(key, v) { try { localStorage.setItem(key, v); return true; } catch { return false; } },
  remove(key) { try { localStorage.removeItem(key); } catch {} },
};

const COLLECTIONS = [
  "quotes", "clients", "jobs", "employees", "subcontractors", "equipment",
  "inventory", "timeentries", "contracts", "safetychecks", "trucklogbooks",
  "warehouses", "managerlogs", "doctemplates",
];

/* ─── Secure data layer (Supabase-backed) ────────────────────────────────────
   All company data lives in the `records` table, isolated per company by the
   database's Row Level Security. We keep an in-memory mirror of the current
   company's records so the UI can read synchronously (as it always has); writes
   go to the database and update the mirror optimistically, rolling back + warning
   on failure. CURRENT_COMPANY_ID is set at login and stamped on every insert;
   even so, the DB independently rejects any cross-company access. */
let CURRENT_COMPANY_ID = null;
const store = {};
COLLECTIONS.forEach(c => { store[c] = []; });

// Subscribers (the shell) re-render when a background write rolls back.
const dataListeners = new Set();
function notifyData() { dataListeners.forEach(fn => { try { fn(); } catch {} }); }
function useDataVersion() {
  const [v, setV] = useState(0);
  useEffect(() => {
    const fn = () => setV(x => x + 1);
    dataListeners.add(fn);
    return () => dataListeners.delete(fn);
  }, []);
  return v;
}

const rowToRecord = row => ({ ...(row.data || {}), _id: row.id, _createdDate: row.created_at, _updatedDate: row.updated_at });
const stripMeta = rec => { const { _id, _createdDate, _updatedDate, ...data } = rec; return data; };

async function loadAllRecords() {
  COLLECTIONS.forEach(c => { store[c] = []; });
  const { data, error } = await supa
    .from("records")
    .select("id,collection,data,created_at,updated_at")
    .order("created_at", { ascending: false });
  if (error) throw error;
  (data || []).forEach(row => {
    if (!store[row.collection]) store[row.collection] = [];
    store[row.collection].push(rowToRecord(row));
  });
}

function clearStore() { COLLECTIONS.forEach(c => { store[c] = []; }); }

function warnWrite(error) {
  console.error("Save failed:", error);
  window.alert("Couldn't save to the server — check your connection and try again.\n\n" + (error?.message || error));
}

// Read helpers used across the app (and by getCol below).
function getCol(name) { return (store[name] || []).slice(); }

const db = {
  getAll(col, filters = {}, opts = {}) {
    let items = (store[col] || []).slice();
    Object.entries(filters).forEach(([k, v]) => {
      if (v !== undefined && v !== null && v !== "") items = items.filter(i => i[k] === v);
    });
    const total = items.length;
    const skip = opts.skip || 0;
    const limit = opts.limit || 1000;
    return { items: items.slice(skip, skip + limit), hasNext: total > skip + limit, total };
  },
  getById(col, id) { return (store[col] || []).find(i => i._id === id) || null; },

  create(col, data) {
    const id = uuid();
    const now = new Date().toISOString();
    const payload = stripMeta(data);
    const rec = { ...payload, _id: id, _createdDate: now, _updatedDate: now };
    if (!store[col]) store[col] = [];
    store[col].unshift(rec); // optimistic
    supa.from("records").insert({ id, company_id: CURRENT_COMPANY_ID, collection: col, data: payload })
      .then(({ error }) => { if (error) { store[col] = (store[col] || []).filter(r => r._id !== id); warnWrite(error); notifyData(); } });
    return rec;
  },

  update(col, data) {
    const arr = store[col] || [];
    const idx = arr.findIndex(i => i._id === data._id);
    if (idx === -1) return null;
    const prev = arr[idx];
    const merged = { ...prev, ...data, _updatedDate: new Date().toISOString() };
    arr[idx] = merged; // optimistic
    supa.from("records").update({ data: stripMeta(merged) }).eq("id", data._id)
      .then(({ error }) => { if (error) { const a = store[col] || []; const i = a.findIndex(r => r._id === data._id); if (i > -1) a[i] = prev; warnWrite(error); notifyData(); } });
    return merged;
  },

  remove(col, id) {
    const arr = store[col] || [];
    const idx = arr.findIndex(i => i._id === id);
    const prev = idx > -1 ? arr[idx] : null;
    if (idx > -1) arr.splice(idx, 1); // optimistic
    supa.from("records").delete().eq("id", id)
      .then(({ error }) => { if (error && prev) { (store[col] || []).splice(Math.min(idx, (store[col] || []).length), 0, prev); warnWrite(error); notifyData(); } });
    return true;
  },

  // Awaited bulk ops — used by seed / import / wipe, which reload right after and
  // therefore must not race the network.
  async bulkInsert(rowsByCol) {
    const payload = [];
    Object.entries(rowsByCol).forEach(([col, rows]) => {
      (rows || []).forEach(r => payload.push({ id: uuid(), company_id: CURRENT_COMPANY_ID, collection: col, data: stripMeta(r) }));
    });
    if (payload.length === 0) return;
    // Insert in chunks to stay well under any request-size limits.
    for (let i = 0; i < payload.length; i += 200) {
      const { error } = await supa.from("records").insert(payload.slice(i, i + 200));
      if (error) throw error;
    }
  },
  async deleteAllForCompany() {
    const { error } = await supa.from("records").delete().eq("company_id", CURRENT_COMPANY_ID);
    if (error) throw error;
    clearStore();
  },
};

/* ─── Shared helpers ─────────────────────────────────────────────────────── */
function fmt(n, currency = "CAD") {
  const val = Number(n);
  return new Intl.NumberFormat("en-CA", {
    style: "currency", currency: currency || "CAD", minimumFractionDigits: 2,
  }).format(Number.isFinite(val) ? val : 0);
}

function num(v, fallback = 0) {
  const n = parseFloat(v);
  return Number.isFinite(n) ? n : fallback;
}

// Local calendar date as YYYY-MM-DD. toISOString() would return the UTC day,
// which is wrong for anyone west of Greenwich in the evening.
function dateStr(d = new Date()) {
  const pad = n => String(n).padStart(2, "0");
  return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
}
function today() { return dateStr(); }

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function toCSV(rows) {
  // Prefix BOM so Excel reads UTF-8 correctly; escape embedded quotes.
  return "﻿" + rows
    .map(r => r.map(c => '"' + String(c === undefined || c === null ? "" : c).replace(/"/g, '""') + '"').join(","))
    .join("\r\n");
}

function hoursBetween(start, end) {
  if (!start || !end) return 0;
  const [sh, sm] = start.split(":").map(Number);
  const [eh, em] = end.split(":").map(Number);
  if (![sh, sm, eh, em].every(Number.isFinite)) return 0;
  return Math.max(0, (eh * 60 + em - sh * 60 - sm) / 60);
}

/* ─── Theme ──────────────────────────────────────────────────────────────── */
// primary/secondary resolve through CSS variables so company branding applies live.
const C = {
  bg: "#F9FAFB",
  surface: "#FFFFFF",
  surfaceAlt: "#F3F4F6",
  primary: "var(--brand-primary)",
  secondary: "var(--brand-secondary)",
  accent: "#6366F1",
  destructive: "#EF4444",
  text: "#111827",
  textMuted: "#6B7280",
  border: "#E5E7EB",
  green: "#22C55E",
};

const inputCls = {
  width: "100%", padding: "8px 12px", border: "1px solid " + C.border,
  borderRadius: 8, fontSize: 13, background: C.surface, color: C.text,
  outline: "none",
};
const btnBase = { border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 600, fontSize: 13, padding: "9px 18px" };
const btnPrimary = { ...btnBase, background: C.primary, color: "#fff" };
const btnSecondary = { ...btnBase, background: C.secondary, color: "#fff" };
const btnOutline = { ...btnBase, background: "transparent", color: C.text, border: "1px solid " + C.border };
const btnDanger = { ...btnBase, background: C.destructive, color: "#fff", padding: "6px 12px", borderRadius: 6, fontSize: 12 };
const card = {
  background: C.surface, borderRadius: 12, border: "1px solid " + C.border,
  padding: 20, marginBottom: 16,
};

/* ─── Auth + company context (Supabase) ──────────────────────────────────── */
const AuthCtx = createContext(null);
const useAuth = () => useContext(AuthCtx);
const CompanyCtx = createContext(null);
const useCompany = () => useContext(CompanyCtx);

const DEFAULT_PRIMARY = "#111827";
const DEFAULT_SECONDARY = "#16A34A";
const BRANDING_KEYS = ["primaryColor", "secondaryColor", "logoUrl", "address", "phone", "email", "website"];

function applyBranding(company) {
  const root = document.documentElement;
  root.style.setProperty("--brand-primary", company?.primaryColor || DEFAULT_PRIMARY);
  root.style.setProperty("--brand-secondary", company?.secondaryColor || DEFAULT_SECONDARY);
}

// DB companies row → the flat shape the app UI expects.
function companyRowToApp(row) {
  return { id: row.id, companyName: row.name || "My Company", joinCode: row.join_code || "", userRole: "Owner", ...(row.settings || {}) };
}

function AuthProvider({ children }) {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [company, setCompany] = useState(null);
  const [noAccess, setNoAccess] = useState(false); // signed in but no membership (removed/denied)
  const [ready, setReady] = useState(false);       // first auth check finished
  const [dataReady, setDataReady] = useState(false); // records loaded for this session
  const companyRef = useRef(null);
  companyRef.current = company;
  const sessionRef = useRef(null);
  sessionRef.current = session;

  // Load profile + company + all records for a signed-in session.
  const bootstrap = async (sess) => {
    if (!sess) { CURRENT_COMPANY_ID = null; clearStore(); setProfile(null); setCompany(null); setNoAccess(false); setDataReady(false); return; }
    try {
      let prof = null;
      for (let attempt = 0; attempt < 4 && !prof; attempt++) {
        const { data, error } = await supa.from("profiles").select("*").eq("id", sess.user.id).maybeSingle();
        if (error) throw error;
        prof = data;
        if (!prof) await new Promise(r => setTimeout(r, 500)); // signup trigger race — retry
      }
      setProfile(prof);
      // No membership row → removed, denied, or link broken.
      if (!prof) { CURRENT_COMPANY_ID = null; clearStore(); setCompany(null); setNoAccess(true); setDataReady(true); return; }
      setNoAccess(false);
      // Pending approval → the DB blocks all company data; show the waiting screen.
      // (A missing status — e.g. before the team migration runs — counts as active.)
      if (prof.status && prof.status !== "active") { CURRENT_COMPANY_ID = null; clearStore(); setCompany(null); setDataReady(true); return; }
      CURRENT_COMPANY_ID = prof.company_id;
      const { data: comp, error: cErr } = await supa.from("companies").select("*").eq("id", prof.company_id).maybeSingle();
      if (cErr) throw cErr;
      setCompany(comp ? companyRowToApp(comp) : { id: prof.company_id, companyName: "My Company" });
      await loadAllRecords();
      setDataReady(true);
    } catch (e) {
      console.error("bootstrap failed:", e);
      window.alert("Could not load your account data: " + (e.message || e) + "\nTry signing out and back in.");
      setDataReady(true); // let the app render rather than hang
    }
  };

  useEffect(() => {
    let lastUserId = null;
    const { data: sub } = supa.auth.onAuthStateChange((event, sess) => {
      setSession(sess);
      const uid = sess?.user?.id || null;
      if (event === "SIGNED_OUT" || !uid) {
        lastUserId = null; CURRENT_COMPANY_ID = null; clearStore();
        setProfile(null); setCompany(null); setNoAccess(false); setDataReady(false); setReady(true);
        return;
      }
      // Only (re)load data when the actual user changes — ignore token refreshes.
      if (uid !== lastUserId) {
        lastUserId = uid;
        setDataReady(false);
        bootstrap(sess).finally(() => setReady(true));
      } else {
        setReady(true);
      }
    });
    return () => { sub.subscription.unsubscribe(); };
  }, []);

  useEffect(() => { applyBranding(company); }, [company]);

  // Re-check membership (used by the pending screen's "Check again").
  const refresh = async () => { if (sessionRef.current) { setDataReady(false); await bootstrap(sessionRef.current); } };

  const login = async ({ email, password }) => {
    const { error } = await supa.auth.signInWithPassword({ email: email.trim(), password });
    return error ? { ok: false, error: error.message } : { ok: true };
  };

  const signup = async ({ name, email, password, companyName, joinCode }) => {
    const meta = { full_name: name };
    if (joinCode) meta.join_code = joinCode.trim(); else meta.company_name = companyName;
    const { data, error } = await supa.auth.signUp({
      email: email.trim(),
      password,
      options: {
        data: meta,
        // After the user clicks the confirmation link, return them to this site.
        emailRedirectTo: window.location.origin + window.location.pathname,
      },
    });
    if (error) return { ok: false, error: error.message };
    if (!data.session) return { ok: true, needsConfirm: true, joined: !!joinCode };
    return { ok: true, joined: !!joinCode };
  };

  const logout = async () => { await supa.auth.signOut(); };

  // Given a join code, return the company name (for the "you're joining X" confirm).
  const checkCompanyCode = async (code) => {
    const { data, error } = await supa.rpc("company_name_for_code", { code: (code || "").trim() });
    if (error) return { ok: false, error: error.message };
    return { ok: true, companyName: data || null };
  };

  const updateCompany = async (patch) => {
    const next = { ...(companyRef.current || {}), ...patch };
    setCompany(next);
    if (!next.id) return;
    const settings = {};
    BRANDING_KEYS.forEach(k => { if (next[k] !== undefined) settings[k] = next[k]; });
    const { error } = await supa.from("companies")
      .update({ name: next.companyName || "My Company", settings })
      .eq("id", next.id);
    if (error) window.alert("Couldn't save company settings: " + error.message);
  };

  const regenerateJoinCode = async () => {
    const code = String(Math.floor(Math.random() * 1000000)).padStart(6, "0");
    const { error } = await supa.from("companies").update({ join_code: code }).eq("id", companyRef.current.id);
    if (error) { window.alert("Couldn't regenerate the code: " + error.message); return null; }
    setCompany(c => ({ ...c, joinCode: code }));
    return code;
  };

  // ── Team management (owner) ──
  const fetchTeam = async () => {
    const { data, error } = await supa.from("profiles").select("*").eq("company_id", companyRef.current?.id).order("created_at", { ascending: true });
    if (error) { console.error(error); return []; }
    return data || [];
  };
  const approveMember = async (id) => {
    const { error } = await supa.from("profiles").update({ status: "active" }).eq("id", id);
    if (error) window.alert("Approve failed: " + error.message);
    return !error;
  };
  const removeMember = async (id) => {
    const { error } = await supa.from("profiles").delete().eq("id", id);
    if (error) window.alert("Remove failed: " + error.message);
    return !error;
  };
  const setMemberRole = async (id, role) => {
    const { error } = await supa.from("profiles").update({ role }).eq("id", id);
    if (error) window.alert("Couldn't change role: " + error.message);
    return !error;
  };
  const setMemberPermissions = async (id, permissions) => {
    const { error } = await supa.from("profiles").update({ permissions }).eq("id", id);
    if (error) window.alert("Couldn't save permissions: " + error.message);
    return !error;
  };

  const user = session ? {
    id: session.user.id,
    email: session.user.email,
    name: profile?.full_name || session.user.user_metadata?.full_name || (session.user.email || "").split("@")[0],
    role: profile?.role || "Owner",
    status: profile?.status || null,
    permissions: profile?.permissions || {},
    companyId: profile?.company_id || null,
    isOwner: profile?.role === "Owner",
    companyName: company?.companyName || "",
  } : null;

  const pending = !!session && !noAccess && profile && profile.status && profile.status !== "active";

  return (
    <AuthCtx.Provider value={{
      user, isAuthenticated: !!session, pending, noAccess, ready, dataReady,
      login, signup, logout, refresh, checkCompanyCode,
      fetchTeam, approveMember, removeMember, setMemberRole, setMemberPermissions,
    }}>
      <CompanyCtx.Provider value={{ company, updateCompany, companyId: company?.id, regenerateJoinCode }}>
        {children}
      </CompanyCtx.Provider>
    </AuthCtx.Provider>
  );
}

// CompanyProvider is now folded into AuthProvider; keep a passthrough so the
// existing <CompanyProvider> wrapper in App() still works.
function CompanyProvider({ children }) { return children; }

/* ─── Router ─────────────────────────────────────────────────────────────── */
const RouterCtx = createContext(null);
const useRouter = () => useContext(RouterCtx);

function Router({ children }) {
  const [route, setRoute] = useState(() => ({
    page: (window.location.hash || "").replace(/^#\/?/, "") || "dashboard",
    params: {},
  }));

  const navigate = (page, params = {}) => {
    setRoute({ page, params });
    window.location.hash = "#/" + page;
    window.scrollTo(0, 0);
  };

  // Support browser back/forward via the hash.
  useEffect(() => {
    const onHash = () => {
      const page = (window.location.hash || "").replace(/^#\/?/, "") || "dashboard";
      setRoute(r => (r.page === page ? r : { page, params: {} }));
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  return (
    <RouterCtx.Provider value={{ page: route.page, params: route.params, navigate }}>
      {children}
    </RouterCtx.Provider>
  );
}

function TextInput({ value, onChange, placeholder, type = "text", rows, style = {}, ...rest }) {
  const s = { ...inputCls, ...style };
  const val = value === undefined || value === null ? "" : value;
  return rows
    ? <textarea value={val} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{ ...s, resize: "vertical" }} {...rest} />
    : <input type={type} value={val} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={s} {...rest} />;
}

function Select({ value, onChange, options, style = {}, placeholder }) {
  return (
    <select value={value === undefined || value === null ? "" : value} onChange={e => onChange(e.target.value)} style={{ ...inputCls, ...style }}>
      {placeholder && <option value="">{placeholder}</option>}
      {options.map(o => typeof o === "string"
        ? <option key={o} value={o}>{o}</option>
        : <option key={String(o.value)} value={o.value}>{o.label}</option>)}
    </select>
  );
}

function Checkbox({ checked, onChange, label }) {

  );
}

function Modal({ title, onClose, children, width = 560 }) {
  useEffect(() => {

function defaultCell(value) {

  if (typeof value === "boolean") return value ? "Yes" : "No";

function DataTable({ columns, rows, onEdit, onDelete, onView, emptyMessage = "No data yet" }) {
  const hasActions = !!(onEdit || onDelete || onView);
  if (!rows || rows.length === 0) {
    return <div style={{ textAlign: "center", padding: 40, color: C.textMuted }}>{emptyMessage}</div>;
  }
  return (
    <div className="scroll-x">
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <thead>
          <tr style={{ background: C.surfaceAlt }}>
            {columns.map(c => (
              <th key={c.key} style={{ padding: "10px 12px", textAlign: "left", fontWeight: 700, fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.5px", borderBottom: "2px solid " + C.border, whiteSpace: "nowrap" }}>
                {c.label}
              </th>
            ))}
            {hasActions && <th style={{ width: 140, padding: "10px 12px", borderBottom: "2px solid " + C.border }} />}
          </tr>
        </thead>
        <tbody>
          {rows.map((row, i) => (
            <tr key={row._id || i} style={{ borderBottom: "1px solid " + C.border, background: i % 2 === 0 ? C.surface : "#FAFAFA" }}>
              {columns.map(c => (
                <td key={c.key} style={{ padding: "10px 12px", color: C.text }}>
                  {c.render ? c.render(row[c.key], row) : defaultCell(row[c.key])}
                </td>
              ))}
              {hasActions && (
                <td style={{ padding: "10px 12px" }}>
                  <div style={{ display: "flex", gap: 6 }}>
                    {onView && <button type="button" onClick={() => onView(row)} style={{ ...btnOutline, padding: "4px 10px", fontSize: 12 }}>View</button>}
                    {onEdit && <button type="button" onClick={() => onEdit(row)} style={{ ...btnOutline, padding: "4px 10px", fontSize: 12 }}>Edit</button>}
                    {onDelete && <button type="button" onClick={() => onDelete(row)} style={{ ...btnDanger, padding: "4px 10px" }}>Del</button>}
                  </div>
                </td>
              )}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function CRUDForm({ fields, data, onSave, onCancel }) {
  const [form, setForm] = useState({ ...data });
  const [error, setError] = useState("");
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const submit = () => {
    const missing = fields.filter(f => f.required && !String(form[f.key] ?? "").trim());
    if (missing.length) { setError(missing[0].label + " is required."); return; }
    onSave(form);
  };

  return (
    <div>
      {error && <div style={{ background: "#FEF2F2", color: "#DC2626", padding: "10px 14px", borderRadius: 8, marginBottom: 14, fontSize: 13 }}>{error}</div>}
      {fields.map(f => {
        if (f.type === "boolean") {
          return (
            <div key={f.key} style={{ marginBottom: 12 }}>
              <Checkbox checked={!!form[f.key]} onChange={v => set(f.key, v)} label={f.label} />
            </div>
          );
        }
        return (
          <Field key={f.key} label={f.label} required={f.required}>
            {f.type === "select"
              ? <Select value={form[f.key] || ""} onChange={v => set(f.key, v)} options={f.options} placeholder={f.placeholder} />
              : f.type === "textarea"
                ? <TextInput value={form[f.key]} onChange={v => set(f.key, v)} placeholder={f.placeholder} rows={3} />
                : <TextInput type={f.type || "text"} value={form[f.key]} onChange={v => set(f.key, v)} placeholder={f.placeholder} />}
          </Field>
        );
      })}
      <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
        <button type="button" onClick={onCancel} style={{ ...btnOutline, flex: 1 }}>Cancel</button>
        <button type="button" onClick={submit} style={{ ...btnSecondary, flex: 1 }}>Save</button>
      </div>
    </div>
  );
}

function CRUDPage({ title, singular, subtitle, collection, columns, formFields, emptyIcon, defaultValues = {} }) {
  const [items, setItems] = useState(() => db.getAll(collection).items);
  const [modal, setModal] = useState(null);
  const [query, setQuery] = useState("");
  const noun = singular || title.replace(/ies$/, "y").replace(/s$/, "");

  const reload = () => setItems(db.getAll(collection).items);

  const save = (data) => {
    if (modal.mode === "edit") db.update(collection, data);
    else db.create(collection, data);
    setModal(null);
    reload();
  };

  const del = (item) => {
    if (window.confirm("Delete this " + noun.toLowerCase() + "?")) {
      db.remove(collection, item._id);
      reload();
    }
  };

  const openCreate = () => setModal({ mode: "create", data: { _id: genId(), ...defaultValues } });
  const openEdit = (item) => setModal({ mode: "edit", data: { ...item } });

  const filtered = query.trim()
    ? items.filter(item => columns.some(c => String(item[c.key] ?? "").toLowerCase().includes(query.trim().toLowerCase())))
    : items;

  return (
    <div>
      <PageHeader
        title={title}
        subtitle={subtitle}
        action={<button type="button" onClick={openCreate} style={btnSecondary}>+ New {noun}</button>}
      />
      {items.length === 0
        ? <EmptyState
            icon={emptyIcon || "📂"}
            title={"No " + title.toLowerCase() + " yet"}
            subtitle={"Add your first " + noun.toLowerCase() + " to get started."}
            action={<button type="button" onClick={openCreate} style={btnSecondary}>Create {noun}</button>}
          />
        : (
          <div style={card}>
            <div style={{ marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <TextInput value={query} onChange={setQuery} placeholder={"Search " + title.toLowerCase() + "…"} style={{ maxWidth: 280 }} />
              <span style={{ fontSize: 12, color: C.textMuted }}>{filtered.length} of {items.length}</span>
            </div>
            <DataTable columns={columns} rows={filtered} onEdit={openEdit} onDelete={del} emptyMessage="No matches for your search." />
          </div>
        )}

      {modal && (
        <Modal title={(modal.mode === "create" ? "New " : "Edit ") + noun} onClose={() => setModal(null)}>
          <CRUDForm fields={formFields} data={modal.data} onSave={save} onCancel={() => setModal(null)} />
        </Modal>
      )}
    </div>
  );
}

const TAX_PRESETS = [0, 5, 10, 12, 13, 15, 20];

const emptyItem = () => ({ id: genId(), description: "", unit: "", qty: 1, rate: 0, taxable: true });

// True when rich-text HTML has real content (not just empty tags / whitespace).
function hasRichContent(html) {
  if (!html) return false;
  const stripped = html.replace(/<(br|hr)\s*\/?>/gi, "").replace(/<[^>]*>/g, "").replace(/&nbsp;/gi, " ");
  return stripped.trim().length > 0;
}

function calcTotals(doc) {
  const items = Array.isArray(doc.items) ? doc.items : [];
  const lineTotal = it => num(it.qty) * num(it.rate);
  const subtotal = items.reduce((s, it) => s + lineTotal(it), 0);
  const taxableSubtotal = items.filter(i => i.taxable).reduce((s, it) => s + lineTotal(it), 0);
  const discountAmt = doc.discountType === "percent"
    ? subtotal * (num(doc.discount) / 100)
    : Math.min(num(doc.discount), subtotal);
  const afterDiscount = subtotal - discountAmt;
  // Spread the discount proportionally across taxable lines.
  const taxBase = subtotal > 0 ? taxableSubtotal * (1 - discountAmt / subtotal) : 0;
  const taxAmt = taxBase * (num(doc.taxRate) / 100);
  return { subtotal, discountAmt, taxAmt, total: afterDiscount + taxAmt };
}

/* ─── Rich text (Word-style) document editor ─────────────────────────────── */
// A lightweight contenteditable editor with a formatting toolbar. Uses
// document.execCommand — deprecated but supported everywhere and dependency-free,
// which suits this fully-offline app. The HTML is written by the app's own user
// and only ever rendered back to that same user, so no external sanitizer is needed.
const RTE_TOOLS = [
  { cmd: "formatBlock", value: "<h2>", label: "H1", title: "Large heading", style: { fontWeight: 800 } },
  { cmd: "formatBlock", value: "<h3>", label: "H2", title: "Small heading", style: { fontWeight: 700 } },
  { cmd: "formatBlock", value: "<p>", label: "¶", title: "Normal text" },
  { sep: true },
  { cmd: "bold", label: "B", title: "Bold", style: { fontWeight: 800 } },
  { cmd: "italic", label: "I", title: "Italic", style: { fontStyle: "italic" } },
  { cmd: "underline", label: "U", title: "Underline", style: { textDecoration: "underline" } },
  { sep: true },
  { cmd: "insertUnorderedList", label: "• List", title: "Bulleted list" },
  { cmd: "insertOrderedList", label: "1. List", title: "Numbered list" },
  { sep: true },
  { cmd: "justifyLeft", label: "⇤", title: "Align left" },
  { cmd: "justifyCenter", label: "≡", title: "Align center" },
  { cmd: "justifyRight", label: "⇥", title: "Align right" },
  { sep: true },
  { cmd: "removeFormat", label: "Clear", title: "Clear formatting" },
];

function RichTextEditor({ html, onChange, placeholder = "Start typing…", minHeight = 220 }) {
  const ref = useRef(null);

  // Load incoming HTML only when it differs, so we don't clobber the caret on every keystroke.
  useEffect(() => {
    if (ref.current && ref.current.innerHTML !== (html || "")) {
      ref.current.innerHTML = html || "";
    }
  }, [html]);

  const exec = (cmd, value) => {
    ref.current.focus();
    try { document.execCommand(cmd, false, value); } catch { /* unsupported command */ }
    onChange(ref.current.innerHTML);
  };

  const isEmpty = !html || html === "<br>" || html.replace(/<[^>]*>/g, "").trim() === "";

  return (
    <div style={{ border: "1px solid " + C.border, borderRadius: 10, overflow: "hidden", background: C.surface }}>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 2, padding: "6px 8px", background: C.surfaceAlt, borderBottom: "1px solid " + C.border }}>
        {RTE_TOOLS.map((t, i) => t.sep
          ? <div key={"sep" + i} style={{ width: 1, background: C.border, margin: "2px 4px" }} />
          : (
            <button
              key={t.label + i}
              type="button"
              title={t.title}
              // onMouseDown (not click) so the editor keeps its text selection.
              onMouseDown={e => { e.preventDefault(); exec(t.cmd, t.value); }}
              style={{ minWidth: 30, height: 28, padding: "0 8px", background: C.surface, border: "1px solid " + C.border, borderRadius: 6, cursor: "pointer", fontSize: 12, color: C.text, ...t.style }}
            >
              {t.label}
            </button>
          ))}
      </div>
      <div style={{ position: "relative" }}>
        {isEmpty && (
          <div style={{ position: "absolute", top: 14, left: 16, color: C.textMuted, fontSize: 14, pointerEvents: "none" }}>
            {placeholder}
          </div>
        )}
        <div
          ref={ref}
          contentEditable
          suppressContentEditableWarning
          onInput={e => onChange(e.currentTarget.innerHTML)}
          className="rte-surface"
          style={{ minHeight, padding: "12px 16px", fontSize: 14, lineHeight: 1.7, color: C.text, outline: "none" }}
        />
      </div>
    </div>
  );
}

// Reusable document templates: save the current scope write-up under a name,
// then drop it into any future quote. Stored in the "doctemplates" collection so
// it rides along in Settings → Export/Import backups.
function DocumentTemplates({ doc, update }) {
  const [templates, setTemplates] = useState(() => db.getAll("doctemplates").items);
  const [saveOpen, setSaveOpen] = useState(false);
  const [manageOpen, setManageOpen] = useState(false);
  const [name, setName] = useState("");
  const reload = () => setTemplates(db.getAll("doctemplates").items);

  const canSave = hasRichContent(doc.documentHtml);

  const insert = (id) => {
    const t = db.getById("doctemplates", id);
    if (!t) return;
    if (hasRichContent(doc.documentHtml) &&
        !window.confirm('Replace the current document with the template "' + t.name + '"?')) return;
    update({ documentTitle: t.title || doc.documentTitle, documentHtml: t.html || "" });
  };

  const commitSave = () => {
    if (!name.trim()) return;
    db.create("doctemplates", { name: name.trim(), title: doc.documentTitle || "Scope of Work", html: doc.documentHtml });
    setName("");
    setSaveOpen(false);
    reload();
  };

  const del = (t) => {
    if (window.confirm('Delete template "' + t.name + '"?')) { db.remove("doctemplates", t._id); reload(); }
  };

  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 10 }}>
      {templates.length > 0 && (
        <select
          value=""
          onChange={e => { if (e.target.value) insert(e.target.value); e.target.value = ""; }}
          style={{ ...inputCls, width: "auto", minWidth: 200, flex: "0 1 auto" }}
        >
          <option value="">Insert a saved template…</option>
          {templates.map(t => <option key={t._id} value={t._id}>{t.name}</option>)}
        </select>
      )}
      <button
        type="button"
        onClick={() => { setName(doc.documentTitle || ""); setSaveOpen(true); }}
        disabled={!canSave}
        title={canSave ? "Save this document as a reusable template" : "Type some content first"}
        style={{ ...btnOutline, opacity: canSave ? 1 : 0.5, cursor: canSave ? "pointer" : "not-allowed" }}
      >
        💾 Save as Template
      </button>
      {templates.length > 0 && (
        <button type="button" onClick={() => setManageOpen(true)} style={{ ...btnOutline, fontSize: 12, padding: "7px 12px" }}>
          Manage ({templates.length})
        </button>
      )}

      {saveOpen && (
        <Modal title="Save Document Template" width={440} onClose={() => setSaveOpen(false)}>
          <Field label="Template Name" required>
            <TextInput value={name} onChange={setName} placeholder="e.g. Standard Excavation Scope" />
          </Field>
          <p style={{ fontSize: 12, color: C.textMuted, margin: "0 0 16px" }}>
            Saves the current heading and formatted document so you can reuse it on future quotes.
          </p>
          <div style={{ display: "flex", gap: 10 }}>
            <button type="button" onClick={() => setSaveOpen(false)} style={{ ...btnOutline, flex: 1 }}>Cancel</button>
            <button type="button" onClick={commitSave} disabled={!name.trim()} style={{ ...btnSecondary, flex: 1, opacity: name.trim() ? 1 : 0.5 }}>Save Template</button>
          </div>
        </Modal>
      )}

      {manageOpen && (
        <Modal title="Document Templates" width={520} onClose={() => setManageOpen(false)}>
          {templates.length === 0
            ? <p style={{ color: C.textMuted, fontSize: 13 }}>No templates saved yet.</p>
            : templates.map(t => (
              <div key={t._id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, padding: "10px 12px", border: "1px solid " + C.border, borderRadius: 8, marginBottom: 8 }}>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 700 }}>{t.name}</div>
                  <div style={{ fontSize: 11, color: C.textMuted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                    {t.title} — {(t.html || "").replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim().slice(0, 60) || "empty"}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                  <button type="button" onClick={() => { insert(t._id); setManageOpen(false); }} style={{ ...btnOutline, fontSize: 12, padding: "5px 10px" }}>Insert</button>
                  <button type="button" onClick={() => del(t)} style={{ ...btnDanger, padding: "5px 10px" }}>Delete</button>
                </div>
              </div>
            ))}
          <button type="button" onClick={() => setManageOpen(false)} style={{ ...btnOutline, width: "100%", marginTop: 8 }}>Done</button>
        </Modal>
      )}
    </div>
  );
}

function LogoUpload({ logo, onChange }) {
  const ref = useRef(null);
  const handleFile = e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (file.size > 500 * 1024) {
      window.alert("Please pick a logo under 500 KB — larger images can fill up browser storage.");

    reader.onload = ev => onChange(ev.target.result);

  return (
    <div style={{ marginBottom: 12 }}>
      <input ref={ref} type="file" accept="image/*" style={{ display: "none" }} onChange={handleFile} />

  const [savedId, setSavedId] = useState(docId || null);
  const [preview, setPreview] = useState(false);
  const [saved, setSaved] = useState(false);
  const clients = useMemo(() => db.getAll("clients").items, []);
  const jobs = useMemo(() => db.getAll("jobs").items, []);

  const update = patch => setDoc(d => ({ ...d, ...patch }));
  const updateFrom = patch => setDoc(d => ({ ...d, from: { ...d.from, ...patch } }));
  const updateTo = patch => setDoc(d => ({ ...d, to: { ...d.to, ...patch } }));
  const updateItems = items => setDoc(d => ({ ...d, items }));
  const updateItem = (id, field, val) => setDoc(d => ({ ...d, items: d.items.map(it => (it.id === id ? { ...it, [field]: val } : it)) }));

  const totals = calcTotals(doc);

  const handleSave = () => {
    const toSave = { ...doc, totalAmount: totals.total, clientReference: doc.to.name };
    if (savedId) {
      db.update("quotes", { ...toSave, _id: savedId });
    } else {
      const rec = db.create("quotes", toSave);
      setSavedId(rec._id);
    }
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const pickClient = (name) => {
    const c = clients.find(x => x.clientName === name);
    if (!c) { updateTo({ name }); return; }
    updateTo({ name: c.clientName, email: c.emailAddress || "", phone: c.phoneNumber || "", address: c.billingAddress || "" });
  };

  const sectionTitle = t => (
    <div style={{ fontSize: 12, fontWeight: 700, color: C.accent, marginBottom: 12, paddingBottom: 6, borderBottom: "2px solid " + C.accent, textTransform: "uppercase", letterSpacing: "0.5px" }}>{t}</div>
  );

  if (preview) return <PreviewModal doc={doc} onClose={() => setPreview(false)} />;

  return (
    <div style={{ margin: "-28px -32px", background: C.bg, minHeight: "100vh" }}>
      <div style={{ position: "sticky", top: 0, zIndex: 50, background: C.surface, borderBottom: "1px solid " + C.border, padding: "12px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          {onClose && <button type="button" onClick={onClose} style={{ ...btnOutline, fontSize: 12, padding: "5px 12px" }}>← Back</button>}
          <input value={doc.quoteId} onChange={e => update({ quoteId: e.target.value })} style={{ ...inputCls, width: 160, fontWeight: 700, fontSize: 15, border: "none", borderBottom: "2px solid " + C.border, borderRadius: 0 }} />
          <Select value={doc.status} onChange={v => update({ status: v })} options={QUOTE_STATUSES} style={{ width: 120 }} />
          <Select value={doc.currency} onChange={v => update({ currency: v })} options={CURRENCIES} style={{ width: 84 }} />
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          {saved && <span style={{ color: C.green, fontSize: 13, fontWeight: 600 }}>✓ Saved</span>}
          <span style={{ fontSize: 16, fontWeight: 800, color: C.accent }}>{fmt(totals.total, doc.currency)}</span>
          <button type="button" onClick={handleSave} style={btnSecondary}>Save</button>
          <button type="button" onClick={() => setPreview(true)} style={btnPrimary}>Preview &amp; Print</button>
        </div>
      </div>

      <div style={{ padding: 24, maxWidth: 980, margin: "0 auto" }}>
        <div className="grid-3" style={{ marginBottom: 20 }}>
          <Field label="Issue Date"><input type="date" value={doc.issueDate} onChange={e => update({ issueDate: e.target.value })} style={inputCls} /></Field>
          <Field label="Due Date"><input type="date" value={doc.dueDate} onChange={e => update({ dueDate: e.target.value })} style={inputCls} /></Field>
          <Field label="Expiry Date"><input type="date" value={doc.expirationDate} onChange={e => update({ expirationDate: e.target.value })} style={inputCls} /></Field>
        </div>

        <div className="grid-2" style={{ marginBottom: 20 }}>
          <div style={{ ...card, marginBottom: 0 }}>
            {sectionTitle("From (Your Business)")}
            <LogoUpload logo={doc.from.logo} onChange={v => updateFrom({ logo: v })} />
            <Field label="Business Name"><TextInput value={doc.from.name} onChange={v => updateFrom({ name: v })} placeholder="Your Business" /></Field>
            <Field label="Email"><TextInput value={doc.from.email} onChange={v => updateFrom({ email: v })} placeholder="you@business.com" /></Field>
            <Field label="Phone"><TextInput value={doc.from.phone} onChange={v => updateFrom({ phone: v })} placeholder="+1 555 000 0000" /></Field>
            <Field label="Address"><TextInput value={doc.from.address} onChange={v => updateFrom({ address: v })} placeholder="123 Main St, City" rows={2} /></Field>
          </div>
          <div style={{ ...card, marginBottom: 0 }}>
            {sectionTitle("Bill To")}
            {clients.length > 0 && (
              <Field label="Load Saved Client">
                <select value="" onChange={e => e.target.value && pickClient(e.target.value)} style={inputCls}>

            <Field label="Phone"><TextInput value={doc.to.phone} onChange={v => updateTo({ phone: v })} placeholder="+1 555 000 0000" /></Field>
            <Field label="Address"><TextInput value={doc.to.address} onChange={v => updateTo({ address: v })} placeholder="Client address" rows={2} /></Field>

        </div>

        <div style={{ ...card, marginBottom: 20 }}>
          <Field label="Job / Project Reference">
            {jobs.length > 0
              ? (
                <select value={doc.jobReference} onChange={e => update({ jobReference: e.target.value })} style={inputCls}>
                  <option value="">No job selected</option>

                </select>
              )
              : <TextInput value={doc.jobReference} onChange={v => update({ jobReference: v })} placeholder="Job name, number, or ID" />}
          </Field>
        </div>

        <div style={{ ...card, marginBottom: 20 }}>
          {sectionTitle("Line Items")}
          <div className="scroll-x">
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, minWidth: 620 }}>
              <thead>
                <tr style={{ background: C.surfaceAlt }}>
                  {["Description", "Unit", "Qty", "Rate", "Amount", "Tax?", ""].map((h, i) => (
                    <th key={i} style={{ padding: "8px 10px", textAlign: i >= 2 && i <= 4 ? "right" : "left", fontSize: 11, fontWeight: 700, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.5px", borderBottom: "2px solid " + C.border }}>{h}</th>

function QuotesPage({ startNew }) {
  const { navigate } = useRouter();
  const [quotes, setQuotes] = useState(() => db.getAll("quotes").items);
  const [editing, setEditing] = useState(startNew ? "new" : null);

  const reload = () => setQuotes(db.getAll("quotes").items);
  const close = () => { setEditing(null); reload(); if (startNew) navigate("quotes"); };
  const del = q => { if (window.confirm("Delete " + (q.quoteId || "this quote") + "?")) { db.remove("quotes", q._id); reload(); } };

  if (editing !== null) return <QuoteEditor docId={editing === "new" ? null : editing} onClose={close} />;

  const outstanding = quotes
    .filter(q => q.status === "Invoice" || q.status === "Quote")
    .reduce((s, q) => s + num(q.totalAmount), 0);
  const paid = quotes.filter(q => q.status === "Paid").reduce((s, q) => s + num(q.totalAmount), 0);

  return (
    <div>
      <PageHeader
        title="Quotes & Invoices"
        subtitle="Create and manage quotes and invoices for your clients"
        action={<button type="button" onClick={() => setEditing("new")} style={btnSecondary}>+ New Quote</button>}
      />
      {quotes.length === 0
        ? <EmptyState icon="📄" title="No quotes yet" subtitle="Create your first quote to get started." action={<button type="button" onClick={() => setEditing("new")} style={btnSecondary}>Create Quote</button>} />
        : (
          <>
            <div className="grid-3" style={{ marginBottom: 20 }}>
              <StatCard label="Documents" value={quotes.length} icon="📄" />
              <StatCard label="Outstanding" value={fmt(outstanding)} icon="⏳" />
              <StatCard label="Paid" value={fmt(paid)} icon="✅" />
            </div>
            <div style={card}>
              <DataTable
                columns={[
                  { key: "quoteId", label: "ID" },
                  { key: "status", label: "Status", render: v => <StatusBadge status={v} /> },
                  { key: "clientReference", label: "Client" },
                  { key: "jobReference", label: "Job Ref" },
                  { key: "issueDate", label: "Date" },
                  { key: "totalAmount", label: "Total", render: (v, row) => fmt(v, row.currency) },
                ]}
                rows={quotes}
                onView={q => setEditing(q._id)}
                onDelete={del}
              />
            </div>
          </>
        )}
    </div>
  );
}

const newTimeRow = () => ({
  id: genId(), jobLocation: "", contract: "", workDone: "",
  startTime: "08:00", endTime: "17:00", equipment: "", notes: "", mileage: "",
});

function useEmployeeOptions() {
  const { user } = useAuth();
  const employees = useMemo(() => db.getAll("employees").items, []);
  const names = employees.map(e => e.fullName).filter(Boolean);
  const me = user?.name || user?.email || "Unknown";
  return names.includes(me) ? names : [me, ...names];
}

function TimeEntryPage() {
  const { user } = useAuth();
  const employeeOptions = useEmployeeOptions();
  const [employeeName, setEmployeeName] = useState(employeeOptions[0] || "Unknown");
  const [date, setDate] = useState(today());
  const [rows, setRows] = useState([newTimeRow()]);
  const [message, setMessage] = useState("");
  const [entries, setEntries] = useState(() => db.getAll("timeentries", {}, { limit: 20 }).items);
  const jobs = useMemo(() => db.getAll("jobs").items, []);
  const equipment = useMemo(() => db.getAll("equipment").items, []);

  const updRow = (id, k, v) => setRows(r => r.map(x => (x.id === id ? { ...x, [k]: v } : x)));
  const delRow = id => setRows(r => r.filter(x => x.id !== id));
  const totalHours = rows.reduce((t, r) => t + hoursBetween(r.startTime, r.endTime), 0);

  const refresh = () => setEntries(db.getAll("timeentries", {}, { limit: 20 }).items);

  const submit = () => {
    const valid = rows.filter(r => r.jobLocation || r.workDone);
    if (valid.length === 0) { window.alert("Add a job or a description of the work before submitting."); return; }
    valid.forEach(r => {
      db.create("timeentries", {
        employeeName,
        jobName: r.jobLocation,
        entryDate: date,
        hoursWorked: hoursBetween(r.startTime, r.endTime),
        startTime: r.startTime,
        endTime: r.endTime,
        workDescription: r.workDone,
        notes: r.notes,
        equipmentUsed: r.equipment,
        mileageDriven: num(r.mileage),
      });
    });
    setRows([newTimeRow()]);
    refresh();
    setMessage(valid.length + " time " + (valid.length === 1 ? "entry" : "entries") + " submitted!");
    setTimeout(() => setMessage(""), 3000);
  };

  return (
    <div>
      <PageHeader title="Time Tracking" subtitle="Log your daily work hours and activities" />
      <Toast message={message} />

      <div style={{ ...card, marginBottom: 20 }}>
        <div className="row-wrap" style={{ marginBottom: 16 }}>
          <Field label="Employee" style={{ marginBottom: 0 }}>
            <Select value={employeeName} onChange={setEmployeeName} options={employeeOptions} style={{ width: 200 }} />
          </Field>
          <Field label="Date" style={{ marginBottom: 0 }}>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} style={inputCls} />
          </Field>
          <div style={{ fontSize: 14, color: C.textMuted, paddingBottom: 8 }}>
            Total: <strong style={{ color: C.accent }}>{totalHours.toFixed(2)} hrs</strong>
          </div>
          <div style={{ fontSize: 14, color: C.textMuted, paddingBottom: 8 }}>{rows.length}/10 rows</div>
        </div>

        <div className="scroll-x">
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, minWidth: 860 }}>
            <thead>
              <tr style={{ background: C.surfaceAlt }}>
                {["Job / Location", "Work Done", "Start", "End", "Hrs", "Equipment", "Miles", "Notes", ""].map(h => (
                  <th key={h} style={{ padding: "8px 10px", textAlign: "left", fontWeight: 700, fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.5px", borderBottom: "2px solid " + C.border }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={r.id} style={{ background: i % 2 === 0 ? C.surface : "#FAFAFA", borderBottom: "1px solid " + C.border }}>
                  <td style={{ padding: "6px 8px" }}>
                    {jobs.length > 0
                      ? (
                        <select value={r.jobLocation} onChange={e => updRow(r.id, "jobLocation", e.target.value)} style={{ ...inputCls, minWidth: 140 }}>
                          <option value="">Select job…</option>
                          {jobs.map(j => <option key={j._id} value={j.jobTitle}>{j.jobTitle}</option>)}
                        </select>
                      )
                      : <input value={r.jobLocation} onChange={e => updRow(r.id, "jobLocation", e.target.value)} placeholder="Site A" style={{ ...inputCls, minWidth: 130 }} />}
                  </td>
                  <td style={{ padding: "6px 8px" }}><input value={r.workDone} onChange={e => updRow(r.id, "workDone", e.target.value)} placeholder="Excavation…" style={{ ...inputCls, minWidth: 150 }} /></td>
                  <td style={{ padding: "6px 4px" }}><input type="time" value={r.startTime} onChange={e => updRow(r.id, "startTime", e.target.value)} style={{ ...inputCls, width: 110 }} /></td>
                  <td style={{ padding: "6px 4px" }}><input type="time" value={r.endTime} onChange={e => updRow(r.id, "endTime", e.target.value)} style={{ ...inputCls, width: 110 }} /></td>
                  <td style={{ padding: "6px 8px", fontWeight: 700, color: C.accent, whiteSpace: "nowrap" }}>{hoursBetween(r.startTime, r.endTime).toFixed(1)}h</td>
                  <td style={{ padding: "6px 4px" }}>
                    {equipment.length > 0
                      ? (
                        <select value={r.equipment} onChange={e => updRow(r.id, "equipment", e.target.value)} style={{ ...inputCls, minWidth: 120 }}>
                          <option value="">None</option>
                          {equipment.map(eq => <option key={eq._id} value={eq.equipmentName}>{eq.equipmentName}</option>)}
                        </select>
                      )
                      : <input value={r.equipment} onChange={e => updRow(r.id, "equipment", e.target.value)} placeholder="None" style={{ ...inputCls, width: 110 }} />}
                  </td>
                  <td style={{ padding: "6px 4px" }}><input type="number" min="0" value={r.mileage} onChange={e => updRow(r.id, "mileage", e.target.value)} placeholder="0" style={{ ...inputCls, width: 70 }} /></td>
                  <td style={{ padding: "6px 4px" }}><input value={r.notes} onChange={e => updRow(r.id, "notes", e.target.value)} placeholder="Notes…" style={{ ...inputCls, minWidth: 110 }} /></td>
                  <td style={{ padding: "6px 4px" }}>
                    {rows.length > 1 && <button type="button" onClick={() => delRow(r.id)} style={{ background: "none", border: "none", color: C.textMuted, cursor: "pointer", fontSize: 16 }}>×</button>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div style={{ display: "flex", gap: 12, marginTop: 16, flexWrap: "wrap" }}>
          {rows.length < 10 && <button type="button" onClick={() => setRows(r => [...r, newTimeRow()])} style={btnOutline}>+ Add Row</button>}
          <button type="button" onClick={submit} style={btnSecondary}>Submit Time Entries</button>
        </div>
      </div>

      <div style={card}>
        <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 16 }}>Recent Entries</h3>
        <DataTable
          columns={[
            { key: "entryDate", label: "Date" },
            { key: "employeeName", label: "Employee" },
            { key: "jobName", label: "Job" },
            { key: "hoursWorked", label: "Hours", render: v => num(v).toFixed(2) + "h" },
            { key: "equipmentUsed", label: "Equipment" },
            { key: "workDescription", label: "Work" },
          ]}
          rows={entries}
          emptyMessage="No entries yet."
          onDelete={e => { if (window.confirm("Delete this entry?")) { db.remove("timeentries", e._id); refresh(); } }}
        />
      </div>
    </div>
  );
}

function TruckLogForm({ data, onSave, onCancel }) {
  const [form, setForm] = useState({ ...data });
  const [error, setError] = useState("");
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const overall = !!(form.brakesChecked && form.lightsChecked && form.fluidsChecked);

  const submit = () => {
    if (!String(form.vehicleIdentifier || "").trim()) { setError("Vehicle ID is required."); return; }
    if (!String(form.employeeName || "").trim()) { setError("Employee name is required."); return; }
    onSave(form);
  };

  return (
    <div>
      {error && <div style={{ background: "#FEF2F2", color: "#DC2626", padding: "10px 14px", borderRadius: 8, marginBottom: 14, fontSize: 13 }}>{error}</div>}
      <Field label="Vehicle ID / Name" required><TextInput value={form.vehicleIdentifier} onChange={v => set("vehicleIdentifier", v)} placeholder="Truck 01, Excavator A…" /></Field>
      <Field label="Employee Name" required><TextInput value={form.employeeName} onChange={v => set("employeeName", v)} placeholder="John Doe" /></Field>
      <Field label="Odometer Reading"><TextInput type="number" value={form.odometerReading} onChange={v => set("odometerReading", v)} placeholder="0" /></Field>
      <div style={{ marginBottom: 12 }}>
        <label style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, display: "block", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.5px" }}>Safety Checks</label>
        {[
          ["brakesChecked", "Brakes checked and operational"],
          ["lightsChecked", "Lights checked and operational"],
          ["fluidsChecked", "Fluid levels checked and adequate"],
        ].map(([k, l]) => (
          <div key={k} style={{ marginBottom: 8 }}>
            <Checkbox checked={form[k]} onChange={v => set(k, v)} label={l} />
          </div>
        ))}
      </div>
      <Field label="Defects / Notes"><TextInput value={form.notes} onChange={v => set("notes", v)} placeholder="Anything needing attention…" rows={2} /></Field>
      <div style={{ padding: "10px 14px", background: overall ? "#F0FDF4" : "#FEF2F2", borderRadius: 8, marginBottom: 16, textAlign: "center", fontWeight: 700, color: overall ? "#16A34A" : "#DC2626" }}>
        Overall Status: {overall ? "PASS" : "FAIL"}
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        <button type="button" onClick={onCancel} style={{ ...btnOutline, flex: 1 }}>Cancel</button>
        <button type="button" onClick={submit} style={{ ...btnSecondary, flex: 1 }}>Save</button>
      </div>
    </div>
  );
}

function TruckLogBooksPage() {
  const { user } = useAuth();
  const [logs, setLogs] = useState(() => db.getAll("trucklogbooks").items);
  const [modal, setModal] = useState(null);
  const reload = () => setLogs(db.getAll("trucklogbooks").items);

  const blank = () => ({
    _id: genId(), vehicleIdentifier: "", employeeName: user?.name || "",
    brakesChecked: false, lightsChecked: false, fluidsChecked: false,
    odometerReading: "", notes: "",
  });

  const save = (data) => {
    const record = {
      ...data,
      overallStatus: !!(data.brakesChecked && data.lightsChecked && data.fluidsChecked),
      logDateTime: data.logDateTime || new Date().toISOString(),
    };
    if (modal.mode === "edit") db.update("trucklogbooks", record);
    else db.create("trucklogbooks", record);
    setModal(null);
    reload();
  };

  const del = item => { if (window.confirm("Delete this log?")) { db.remove("trucklogbooks", item._id); reload(); } };
  const openCreate = () => setModal({ mode: "create", data: blank() });

  return (
    <div>
      <PageHeader
        title="Vehicle Log Books"
        subtitle="Daily morning safety checklists for vehicles and equipment"
        action={<button type="button" onClick={openCreate} style={btnSecondary}>+ New Log</button>}
      />
      {logs.length === 0
        ? <EmptyState icon="🚚" title="No vehicle logs yet" subtitle="Create daily safety checklists for your fleet." action={<button type="button" onClick={openCreate} style={btnSecondary}>Create Log</button>} />
        : (
          <div style={card}>
            <DataTable
              columns={[
                { key: "vehicleIdentifier", label: "Vehicle" },
                { key: "employeeName", label: "Employee" },
                { key: "logDateTime", label: "Date/Time", render: v => (v ? new Date(v).toLocaleString() : "—") },
                { key: "odometerReading", label: "Odometer", render: v => (v ? num(v).toLocaleString() + " mi" : "—") },
                { key: "brakesChecked", label: "Brakes", render: v => (v ? "✅" : "❌") },
                { key: "lightsChecked", label: "Lights", render: v => (v ? "✅" : "❌") },
                { key: "fluidsChecked", label: "Fluids", render: v => (v ? "✅" : "❌") },
                { key: "overallStatus", label: "Status", render: v => <PassFailBadge value={v} /> },
              ]}
              rows={logs}
              onEdit={item => setModal({ mode: "edit", data: { ...item } })}
              onDelete={del}
            />
          </div>
        )}
      {modal && (
        <Modal title={modal.mode === "create" ? "New Vehicle Log" : "Edit Vehicle Log"} onClose={() => setModal(null)}>
          <TruckLogForm data={modal.data} onSave={save} onCancel={() => setModal(null)} />
        </Modal>
      )}
    </div>
  );
}

function EmployeeLogsPage() {
  const [entries] = useState(() => db.getAll("timeentries", {}, { limit: 1000 }).items);
  const employees = useMemo(() => db.getAll("employees").items, []);
  const [selected, setSelected] = useState("");

  const filtered = entries.filter(e => !selected || e.employeeName === selected);
  const rateFor = name => {
    const emp = employees.find(x => x.fullName === name);
    return emp ? num(emp.hourlyRate) : 0;
  };

  const byEmployee = filtered.reduce((acc, e) => {
    const n = e.employeeName || "Unknown";
    if (!acc[n]) acc[n] = { hours: 0, miles: 0, entries: 0 };
    acc[n].hours += num(e.hoursWorked);
    acc[n].miles += num(e.mileageDriven);
    acc[n].entries += 1;
    return acc;
  }, {});

  return (
    <div>
      <PageHeader title="Work Logs" subtitle="Per-employee productivity and hours tracked" />
      <div style={{ ...card, marginBottom: 20 }}>
        <Field label="Filter by Employee" style={{ marginBottom: 0 }}>
          <select value={selected} onChange={e => setSelected(e.target.value)} style={{ ...inputCls, maxWidth: 240 }}>
            <option value="">All Employees</option>
            {employees.map(emp => <option key={emp._id} value={emp.fullName}>{emp.fullName}</option>)}
          </select>
        </Field>
      </div>

      <div className="grid-auto" style={{ marginBottom: 24 }}>
        {Object.entries(byEmployee).map(([name, stats]) => (
          <div key={name} style={{ ...card, marginBottom: 0 }}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 12 }}>{name}</div>
            {[
              ["Hours Worked", stats.hours.toFixed(2) + "h"],
              ["Miles Driven", stats.miles.toFixed(0) + " mi"],
              ["Log Entries", stats.entries],
              ["Labour Cost", fmt(stats.hours * rateFor(name))],
            ].map(([l, v]) => (
              <div key={l} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid " + C.border }}>
                <span style={{ fontSize: 12, color: C.textMuted }}>{l}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: C.accent }}>{v}</span>
              </div>
            ))}
          </div>
        ))}
        {Object.keys(byEmployee).length === 0 && <p style={{ color: C.textMuted, gridColumn: "1/-1" }}>No time entries found.</p>}
      </div>

      <div style={card}>
        <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 16 }}>All Time Entries</h3>
        <DataTable
          columns={[
            { key: "entryDate", label: "Date" },
            { key: "employeeName", label: "Employee" },
            { key: "jobName", label: "Job" },
            { key: "hoursWorked", label: "Hours", render: v => num(v).toFixed(2) + "h" },
            { key: "mileageDriven", label: "Miles", render: v => (num(v) ? num(v) + " mi" : "—") },
            { key: "equipmentUsed", label: "Equipment" },
          ]}
          rows={filtered}
          emptyMessage="No time entries yet."
        />
      </div>
    </div>
  );
}

function BillingPage() {
  const entries = useMemo(() => db.getAll("timeentries", {}, { limit: 1000 }).items, []);
  const employees = useMemo(() => db.getAll("employees").items, []);
  const [filters, setFilters] = useState({ startDate: "", endDate: "", employee: "", job: "" });

  const rateFor = name => {
    const emp = employees.find(x => x.fullName === name);
    return emp ? num(emp.hourlyRate) : 0;
  };

  const filtered = entries.filter(e => {
    if (filters.startDate && (e.entryDate || "") < filters.startDate) return false;
    if (filters.endDate && (e.entryDate || "") > filters.endDate) return false;
    if (filters.employee && e.employeeName !== filters.employee) return false;
    if (filters.job && !String(e.jobName || "").toLowerCase().includes(filters.job.toLowerCase())) return false;
    return true;
  });

  const totalHours = filtered.reduce((s, e) => s + num(e.hoursWorked), 0);
  const totalCost = filtered.reduce((s, e) => s + num(e.hoursWorked) * rateFor(e.employeeName), 0);
  const totalMiles = filtered.reduce((s, e) => s + num(e.mileageDriven), 0);

  const exportCSV = () => {
    const rows = [
      ["Date", "Employee", "Job", "Hours", "Rate", "Labour Cost", "Miles", "Equipment", "Description"],
      ...filtered.map(e => [
        e.entryDate, e.employeeName, e.jobName, num(e.hoursWorked).toFixed(2),
        rateFor(e.employeeName).toFixed(2), (num(e.hoursWorked) * rateFor(e.employeeName)).toFixed(2),
        num(e.mileageDriven), e.equipmentUsed, e.workDescription,
      ]),
      [],
      ["", "", "TOTAL", totalHours.toFixed(2), "", totalCost.toFixed(2), totalMiles],
    ];
    downloadFile("billing_report_" + today() + ".csv", toCSV(rows), "text/csv;charset=utf-8");
  };

  return (
    <div>
      <PageHeader
        title="Billing & Reports"
        subtitle="Generate billing reports from logged time"
        action={<button type="button" onClick={exportCSV} style={btnSecondary}>📊 Export CSV</button>}
      />

      <div style={{ ...card, marginBottom: 20 }}>
        <div className="row-wrap">
          <Field label="Start Date" style={{ marginBottom: 0 }}><input type="date" value={filters.startDate} onChange={e => setFilters(f => ({ ...f, startDate: e.target.value }))} style={inputCls} /></Field>
          <Field label="End Date" style={{ marginBottom: 0 }}><input type="date" value={filters.endDate} onChange={e => setFilters(f => ({ ...f, endDate: e.target.value }))} style={inputCls} /></Field>
          <Field label="Employee" style={{ marginBottom: 0 }}>
            <select value={filters.employee} onChange={e => setFilters(f => ({ ...f, employee: e.target.value }))} style={{ ...inputCls, width: 180 }}>
              <option value="">All employees</option>
              {[...new Set(entries.map(e => e.employeeName).filter(Boolean))].map(n => <option key={n} value={n}>{n}</option>)}
            </select>
          </Field>
          <Field label="Job contains" style={{ marginBottom: 0 }}>
            <TextInput value={filters.job} onChange={v => setFilters(f => ({ ...f, job: v }))} placeholder="Job name…" style={{ width: 180 }} />
          </Field>
          <button type="button" onClick={() => setFilters({ startDate: "", endDate: "", employee: "", job: "" })} style={btnOutline}>Clear</button>
        </div>
      </div>

      <div className="grid-3" style={{ marginBottom: 20 }}>
        <StatCard label="Total Hours" value={totalHours.toFixed(2)} />
        <StatCard label="Labour Cost" value={fmt(totalCost)} />
        <StatCard label="Entries" value={filtered.length} />
      </div>

      <div style={card}>
        <DataTable
          columns={[
            { key: "entryDate", label: "Date" },
            { key: "employeeName", label: "Employee" },
            { key: "jobName", label: "Job" },
            { key: "hoursWorked", label: "Hours", render: v => num(v).toFixed(2) + "h" },
            { key: "cost", label: "Labour Cost", render: (_v, row) => fmt(num(row.hoursWorked) * rateFor(row.employeeName)) },
            { key: "mileageDriven", label: "Miles", render: v => (num(v) ? num(v) + " mi" : "—") },
            { key: "equipmentUsed", label: "Equipment" },
          ]}
          rows={filtered}
          emptyMessage="No entries match your filters."
        />
      </div>
    </div>
  );
}

/* ─── Schedule ───────────────────────────────────────────────────────────── */
function SchedulePage() {
  const { navigate } = useRouter();
  const [cursor, setCursor] = useState(() => new Date());
  const jobs = useMemo(() => db.getAll("jobs").items, []);

  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const monthStart = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const days = Array.from({ length: daysInMonth }, (_, i) => new Date(year, month, i + 1));

  // A job occupies every day from its start date through its end date.
  const jobsForDay = day => jobs.filter(j => {
    if (!j.startDate) return false;
    const start = new Date(j.startDate + "T00:00:00");
    const end = j.endDate ? new Date(j.endDate + "T00:00:00") : start;
    return day >= start && day <= end;
  });

  return (
    <div>
      <PageHeader title="Schedule" subtitle="Jobs plotted across the calendar" />
      <div style={card}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, gap: 12, flexWrap: "wrap" }}>
          <button type="button" onClick={() => setCursor(new Date(year, month - 1, 1))} style={btnOutline}>← Previous</button>
          <h2 style={{ fontSize: 20, fontWeight: 700 }}>{cursor.toLocaleString("default", { month: "long", year: "numeric" })}</h2>
          <div style={{ display: "flex", gap: 8 }}>
            <button type="button" onClick={() => setCursor(new Date())} style={btnOutline}>Today</button>
            <button type="button" onClick={() => setCursor(new Date(year, month + 1, 1))} style={btnOutline}>Next →</button>
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
          {["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map(d => (
            <div key={d} style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: C.textMuted, padding: "8px 4px", textTransform: "uppercase" }}>{d}</div>
          ))}
          {Array.from({ length: monthStart.getDay() }).map((_, i) => <div key={"pad" + i} />)}
          {days.map(day => {
            const dayJobs = jobsForDay(day);
            const isToday = day.toDateString() === new Date().toDateString();
            return (
              <div key={day.toISOString()} style={{ minHeight: 84, background: isToday ? "#EEF2FF" : C.surfaceAlt, borderRadius: 8, padding: 6, border: isToday ? "2px solid " + C.accent : "1px solid " + C.border }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: isToday ? C.accent : C.textMuted, marginBottom: 4 }}>{day.getDate()}</div>
                {dayJobs.slice(0, 2).map(j => (
                  <div
                    key={j._id}
                    onClick={() => navigate("jobs")}
                    title={j.jobTitle}
                    style={{ background: C.primary, color: "#fff", borderRadius: 4, padding: "2px 5px", fontSize: 10, fontWeight: 600, marginBottom: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", cursor: "pointer" }}
                  >
                    {j.jobTitle}
                  </div>
                ))}
                {dayJobs.length > 2 && <div style={{ fontSize: 10, color: C.textMuted }}>+{dayJobs.length - 2} more</div>}
              </div>
            );
          })}
        </div>
        {jobs.length === 0 && (
          <p style={{ color: C.textMuted, fontSize: 13, marginTop: 16, textAlign: "center" }}>
            No jobs scheduled yet — add jobs with a start date to see them here.
          </p>
        )}
      </div>
    </div>
  );
}

const PERMISSIONS = [
  { key: "canViewReports", label: "View Reports" },
  { key: "canEditQuotes", label: "Edit Quotes" },
  { key: "canManageSubcontractors", label: "Manage Subcontractors" },
  { key: "canViewManagerLogs", label: "View Manager Logs" },
  { key: "canEditSettings", label: "Edit Settings" },
  { key: "canDeleteEntries", label: "Delete Entries" },
];

function AccessControlPage() {
  const employees = useMemo(() => db.getAll("employees").items, []);
  const [permissions, setPermissions] = useState(() => {
    try { return JSON.parse(storage.get("bmb_permissions") || "{}"); } catch { return {}; }
  });
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState({});

  const save = () => {
    const updated = { ...permissions, [editingId]: draft };
    setPermissions(updated);
    storage.set("bmb_permissions", JSON.stringify(updated));
    setEditingId(null);
  };

  return (
    <div>
      <PageHeader title="Access Control" subtitle="Manage user permissions and role-based access" />
      {employees.length === 0
        ? <EmptyState icon="🔒" title="No employees found" subtitle="Add employees first, then set their permissions here." />
        : employees.map(emp => {
          const perms = permissions[emp._id] || {};
          const isEditing = editingId === emp._id;
          return (
            <div key={emp._id} style={card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, gap: 12, flexWrap: "wrap" }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{emp.fullName}</div>
                  <div style={{ fontSize: 12, color: C.textMuted }}>{emp.role || "Unassigned"}{emp.email ? " — " + emp.email : ""}</div>
                </div>
                {!isEditing
                  ? <button type="button" onClick={() => { setEditingId(emp._id); setDraft({ ...perms }); }} style={btnOutline}>Edit Permissions</button>
                  : (
                    <div style={{ display: "flex", gap: 8 }}>
                      <button type="button" onClick={save} style={btnSecondary}>Save</button>
                      <button type="button" onClick={() => setEditingId(null)} style={btnOutline}>Cancel</button>
                    </div>
                  )}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(210px, 1fr))", gap: 8 }}>
                {PERMISSIONS.map(p => {
                  const val = isEditing ? draft[p.key] : perms[p.key];
                  return isEditing
                    ? <Checkbox key={p.key} checked={val} onChange={v => setDraft(d => ({ ...d, [p.key]: v }))} label={p.label} />
                    : (
                      <div key={p.key} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 12px", background: val ? "#F0FDF4" : C.surfaceAlt, borderRadius: 8, border: "1px solid " + (val ? "#BBF7D0" : C.border) }}>
                        <span style={{ fontSize: 14 }}>{val ? "✅" : "🔒"}</span>
                        <span style={{ fontSize: 12, fontWeight: 600 }}>{p.label}</span>
                      </div>
                    );
                })}
              </div>
            </div>
          );
        })}
    </div>
  );
}
