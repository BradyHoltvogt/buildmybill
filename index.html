/* ─── Team (owner: join code, approvals, roles, permissions) ─────────────── */
function TeamPage() {
  const { user, fetchTeam, approveMember, removeMember, setMemberRole, setMemberPermissions } = useAuth();
  const { company, regenerateJoinCode } = useCompany();
  const [members, setMembers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(null);
  const [draftPerms, setDraftPerms] = useState({});
  const [busyId, setBusyId] = useState(null);
  const [copied, setCopied] = useState(false);

  const load = async () => { setLoading(true); setMembers(await fetchTeam()); setLoading(false); };
  useEffect(() => { load(); }, []);

  if (!user?.isOwner) {
    return <EmptyState icon="🔒" title="Owners only" subtitle="Only the company owner can manage the team." />;
  }

  const pending = members.filter(m => m.status && m.status !== "active");
  const active = members.filter(m => !m.status || m.status === "active");
  const grantable = NAV.filter(n => GRANTABLE.includes(n.id));

  const doApprove = async (m) => { setBusyId(m.id); await approveMember(m.id); await load(); setBusyId(null); };
  const doRemove = async (m, verb) => {
    if (!window.confirm(verb + " " + (m.full_name || m.email) + "?")) return;
    setBusyId(m.id); await removeMember(m.id); await load(); setBusyId(null);
  };
  const doRole = async (m, role) => { setBusyId(m.id); await setMemberRole(m.id, role); await load(); setBusyId(null); };
  const openPerms = (m) => { setEditing(m.id); setDraftPerms({ ...(m.permissions || {}) }); };
  const savePerms = async (m) => { setBusyId(m.id); await setMemberPermissions(m.id, draftPerms); await load(); setEditing(null); setBusyId(null); };

  const copyCode = () => {
    if (navigator.clipboard) navigator.clipboard.writeText(company?.joinCode || "").then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });
  };
  const regen = async () => { if (window.confirm("Generate a new join code? The current one stops working immediately.")) await regenerateJoinCode(); };

  return (
    <div>
      <PageHeader title="Team" subtitle="Invite people to your company and control what each person can see" action={<button type="button" onClick={load} style={{ ...btnOutline, fontSize: 12, padding: "6px 12px" }}>↻ Refresh</button>} />

      {/* Join code */}
      <div style={card}>
        <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 8 }}>Company Join Code</h3>
        <p style={{ color: C.textMuted, fontSize: 13, marginBottom: 16, lineHeight: 1.6 }}>
          Share this private code with people you want on your team. They choose <strong>“Join a company”</strong> when signing up and enter it — then you approve them below. Keep it private; regenerate anytime.
        </p>
        <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
          <div style={{ fontSize: 30, fontWeight: 800, letterSpacing: "6px", fontFamily: "monospace", background: C.surfaceAlt, padding: "10px 20px", borderRadius: 10, border: "1px solid " + C.border }}>
            {company?.joinCode || "——————"}
          </div>
          <button type="button" onClick={copyCode} style={btnSecondary}>{copied ? "Copied ✓" : "Copy"}</button>
          <button type="button" onClick={regen} style={btnOutline}>Regenerate</button>
        </div>
      </div>

      {/* Pending approvals */}
      <div style={card}>
        <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 12 }}>
          Pending Requests {pending.length > 0 && <Badge color="#FEFCE8" textColor="#CA8A04">{pending.length}</Badge>}
        </h3>
        {loading
          ? <p style={{ color: C.textMuted, fontSize: 13 }}>Loading…</p>
          : pending.length === 0
            ? <p style={{ color: C.textMuted, fontSize: 13 }}>No one is waiting to join right now.</p>
            : pending.map(m => (
              <div key={m.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, padding: "12px 14px", border: "1px solid " + C.border, borderRadius: 8, marginBottom: 8, flexWrap: "wrap" }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{m.full_name || "(no name)"}</div>
                  <div style={{ fontSize: 12, color: C.textMuted }}>{m.email}</div>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button type="button" disabled={busyId === m.id} onClick={() => doApprove(m)} style={btnSecondary}>Approve</button>
                  <button type="button" disabled={busyId === m.id} onClick={() => doRemove(m, "Deny the request from")} style={btnDanger}>Deny</button>
                </div>
              </div>
            ))}
      </div>

      {/* Active members */}
      <div style={card}>
        <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 12 }}>Team Members</h3>
        {active.length === 0 && <p style={{ color: C.textMuted, fontSize: 13 }}>No active members yet.</p>}
        {active.map(m => {
          const isMe = m.id === user.id;
          const isOwnerRow = m.role === "Owner";
          const isEditing = editing === m.id;
          return (
            <div key={m.id} style={{ border: "1px solid " + C.border, borderRadius: 10, padding: 14, marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{m.full_name || "(no name)"} {isMe && <span style={{ fontSize: 11, color: C.textMuted }}>(you)</span>}</div>
                  <div style={{ fontSize: 12, color: C.textMuted }}>{m.email}</div>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  {isOwnerRow
                    ? <Badge color="#EDE9FE" textColor="#7C3AED">Owner</Badge>
                    : (
                      <>
                        <Select value={m.role} onChange={v => doRole(m, v)} options={["Employee", "Manager", "Owner"]} style={{ width: 130 }} />
                        {!isEditing
                          ? <button type="button" onClick={() => openPerms(m)} style={{ ...btnOutline, fontSize: 12, padding: "6px 12px" }}>Edit Access</button>
                          : (
                            <>
                              <button type="button" disabled={busyId === m.id} onClick={() => savePerms(m)} style={{ ...btnSecondary, fontSize: 12, padding: "6px 12px" }}>Save</button>
                              <button type="button" onClick={() => setEditing(null)} style={{ ...btnOutline, fontSize: 12, padding: "6px 12px" }}>Cancel</button>
                            </>
                          )}
                        {!isMe && <button type="button" disabled={busyId === m.id} onClick={() => doRemove(m, "Remove")} style={btnDanger}>Remove</button>}
                      </>
                    )}
                </div>
              </div>

              {!isOwnerRow && (
                <div style={{ marginTop: 12 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 8 }}>
                    Can access {isEditing ? "(tick to allow)" : ""}
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(190px, 1fr))", gap: 8 }}>
                    {grantable.map(g => {
                      const on = isEditing ? draftPerms[g.id] : (m.permissions && m.permissions[g.id]);
                      return isEditing
                        ? <Checkbox key={g.id} checked={!!on} onChange={v => setDraftPerms(d => ({ ...d, [g.id]: v }))} label={g.label} />
                        : (
                          <div key={g.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: on ? "#F0FDF4" : C.surfaceAlt, borderRadius: 8, border: "1px solid " + (on ? "#BBF7D0" : C.border) }}>
                            <span>{on ? "✅" : "🔒"}</span>
                            <span style={{ fontSize: 12, fontWeight: 600 }}>{g.label}</span>
                          </div>
                        );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── Settings ───────────────────────────────────────────────────────────── */
function SettingsPage() {
  const { company, updateCompany } = useCompany();
  const { user } = useAuth();
  const importRef = useRef(null);
  const [form, setForm] = useState({
    companyName: company?.companyName || "",
    address: company?.address || "",
    phone: company?.phone || "",
    email: company?.email || "",
    website: company?.website || "",
    logoUrl: company?.logoUrl || "",
    primaryColor: company?.primaryColor || DEFAULT_PRIMARY,
    secondaryColor: company?.secondaryColor || DEFAULT_SECONDARY,
  });
  const [message, setMessage] = useState("");

  const save = () => {
    updateCompany(form);
    setMessage("Settings saved.");
    setTimeout(() => setMessage(""), 2500);
  };

  const exportAll = () => {
    const data = { exportedAt: new Date().toISOString(), company, collections: {} };
    COLLECTIONS.forEach(c => { data.collections[c] = getCol(c); });
    downloadFile("buildmybill_backup_" + today() + ".json", JSON.stringify(data, null, 2), "application/json");
  };

  const [busy, setBusy] = useState("");

  const importAll = e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      let parsed;
      try {
        parsed = JSON.parse(ev.target.result);
      } catch { window.alert("That file doesn't look like a BuildMyBill backup."); return; }
      const cols = parsed.collections || parsed;
      if (!cols || typeof cols !== "object") { window.alert("That file doesn't look like a BuildMyBill backup."); return; }
      if (!window.confirm("This REPLACES all of your company's current data with the backup. Continue?")) return;
      setBusy("Importing…");
      try {
        await db.deleteAllForCompany();
        const rowsByCol = {};
        COLLECTIONS.forEach(c => { if (Array.isArray(cols[c])) rowsByCol[c] = cols[c]; });
        await db.bulkInsert(rowsByCol);
        if (parsed.company) await updateCompany(parsed.company);
        window.location.reload();
      } catch (err) {
        setBusy("");
        window.alert("Import failed: " + (err.message || err));
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const loadDemo = async () => {
    if (!window.confirm("Add sample clients, jobs, employees, equipment, and an invoice to your account?")) return;
    setBusy("Adding sample data…");
    try { await seedDemoData(company); window.location.reload(); }
    catch (err) { setBusy(""); window.alert("Couldn't add sample data: " + (err.message || err)); }
  };

  const clearAll = async () => {
    if (!window.confirm("Delete ALL of your company's records? Export a backup first — this cannot be undone.")) return;
    if (!window.confirm("Really delete everything?")) return;
    setBusy("Deleting…");
    try { await db.deleteAllForCompany(); window.location.reload(); }
    catch (err) { setBusy(""); window.alert("Delete failed: " + (err.message || err)); }
  };

  const colorField = (label, key) => (
    <Field label={label}>
      <div style={{ display: "flex", gap: 8 }}>
        <input type="color" value={form[key]} onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))} style={{ width: 48, height: 38, borderRadius: 6, cursor: "pointer", border: "1px solid " + C.border, padding: 2 }} />
        <TextInput value={form[key]} onChange={v => setForm(f => ({ ...f, [key]: v }))} style={{ fontFamily: "monospace" }} />
      </div>
    </Field>
  );

  return (
    <div>
      <PageHeader title="Settings" subtitle="Company details, branding, and your data" />
      <Toast message={message} />

      <div className="grid-2">
        <div style={card}>
          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 16 }}>Company Information</h3>
          <Field label="Company Name"><TextInput value={form.companyName} onChange={v => setForm(f => ({ ...f, companyName: v }))} placeholder="My Construction Company" /></Field>
          <Field label="Address"><TextInput value={form.address} onChange={v => setForm(f => ({ ...f, address: v }))} placeholder="123 Main St, City, Province" /></Field>
          <Field label="Phone"><TextInput value={form.phone} onChange={v => setForm(f => ({ ...f, phone: v }))} placeholder="+1 555 000 0000" /></Field>
          <Field label="Email"><TextInput type="email" value={form.email} onChange={v => setForm(f => ({ ...f, email: v }))} placeholder="info@company.com" /></Field>
          <Field label="Website"><TextInput value={form.website} onChange={v => setForm(f => ({ ...f, website: v }))} placeholder="https://yourcompany.com" /></Field>
        </div>

        <div style={card}>
          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 16 }}>Branding</h3>
          <Field label="Logo URL"><TextInput value={form.logoUrl} onChange={v => setForm(f => ({ ...f, logoUrl: v }))} placeholder="https://…/logo.png" /></Field>
          {form.logoUrl && <img src={form.logoUrl} alt="Logo preview" style={{ maxHeight: 60, maxWidth: 200, objectFit: "contain", marginBottom: 12, borderRadius: 6, border: "1px solid " + C.border }} />}
          {colorField("Primary Color", "primaryColor")}
          {colorField("Secondary Color", "secondaryColor")}
          <div style={{ padding: 12, background: C.surfaceAlt, borderRadius: 8, fontSize: 12, color: C.textMuted }}>
            Preview:{" "}
            <span style={{ background: form.primaryColor, color: "#fff", padding: "3px 10px", borderRadius: 4, marginRight: 6 }}>Primary</span>
            <span style={{ background: form.secondaryColor, color: "#fff", padding: "3px 10px", borderRadius: 4 }}>Secondary</span>
          </div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 20 }}>
        <button type="button" onClick={save} style={btnSecondary}>Save Settings</button>
      </div>

function LoginPage() {
  const { login, signup, checkCompanyCode } = useAuth();
  const [showModal, setShowModal] = useState(false);
  const [isRegister, setIsRegister] = useState(false);
  const [joinMode, setJoinMode] = useState(false);          // register: join existing vs create new
  const [form, setForm] = useState({ name: "", email: "", password: "", companyName: "", joinCode: "" });
  const [codeCompany, setCodeCompany] = useState(null);     // verified company name for the code
  const [verifying, setVerifying] = useState(false);
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");
  const [submitting, setSubmitting] = useState(false);

  const f = k => v => setForm(p => ({ ...p, [k]: v }));
  const open = register => { setIsRegister(register); setJoinMode(false); setCodeCompany(null); setError(""); setInfo(""); setShowModal(true); };
  const switchJoin = (join) => { setJoinMode(join); setCodeCompany(null); setError(""); };

  const verifyCode = async () => {
    setError(""); setCodeCompany(null);
    const code = form.joinCode.trim();
    if (!/^\d{6}$/.test(code)) { setError("Enter the 6-digit code from your company owner."); return; }
    setVerifying(true);
    const r = await checkCompanyCode(code);
    setVerifying(false);
    if (!r.ok) { setError(r.error || "Couldn't check that code right now."); return; }
    if (!r.companyName) { setError("That code doesn't match any company — double-check it with your owner."); return; }
    setCodeCompany(r.companyName);
  };

  const handleSubmit = async e => {
    e.preventDefault();
    setError(""); setInfo("");
    if (!form.email.trim() || !form.password) { setError("Email and password are required."); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email.trim())) { setError("Enter a valid email address."); return; }
    if (isRegister && form.password.length < 6) { setError("Password must be at least 6 characters."); return; }
    if (isRegister && joinMode && !codeCompany) { setError("Verify your company code first."); return; }
    if (isRegister && !joinMode && !form.companyName.trim()) { setError("Company name is required."); return; }

    setSubmitting(true);
    let result;
    const name = form.name.trim() || form.email.split("@")[0];
    if (!isRegister) result = await login({ email: form.email, password: form.password });
    else if (joinMode) result = await signup({ name, email: form.email, password: form.password, joinCode: form.joinCode.trim() });
    else result = await signup({ name, email: form.email, password: form.password, companyName: form.companyName.trim() });
    setSubmitting(false);

    if (!result.ok) { setError(result.error || "Something went wrong. Please try again."); return; }
    if (result.needsConfirm) {
      setInfo(result.joined
        ? "Account created! Confirm your email, then sign in — your owner will approve your access."
        : "Account created! Check your email to confirm it, then sign in.");
      setIsRegister(false); setJoinMode(false);
      return;
    }
    // On success the auth listener swaps the whole app to the dashboard (or the pending screen).
  };

  const s = {

    logoBox: { width: 36, height: 36, borderRadius: 8, background: C.secondary, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 18, color: "#fff", flexShrink: 0 },
    hero: { background: C.primary, color: "#fff", padding: "80px 5% 90px", textAlign: "center" },
    heroTag: { display: "inline-block", background: C.secondary, color: "#fff", fontSize: 12, fontWeight: 700, padding: "4px 14px", borderRadius: 20, marginBottom: 24, letterSpacing: "0.5px", textTransform: "uppercase" },
    heroH1: { fontSize: "clamp(34px, 6vw, 68px)", fontWeight: 900, margin: "0 0 20px", lineHeight: 1.05, letterSpacing: "-2px" },
    heroSub: { fontSize: "clamp(15px, 2vw, 19px)", opacity: 0.7, maxWidth: 580, margin: "0 auto 40px", lineHeight: 1.6 },
    btnGreen: { padding: "14px 32px", background: C.secondary, color: "#fff", border: "none", borderRadius: 10, fontWeight: 700, fontSize: 15, cursor: "pointer" },
    btnGhost: { padding: "14px 32px", background: "transparent", color: "#fff", border: "2px solid rgba(255,255,255,0.4)", borderRadius: 10, fontWeight: 700, fontSize: 15, cursor: "pointer" },
    section: { padding: "72px 5%" },
    sectionAlt: { padding: "72px 5%", background: "#F9FAFB" },
    sectionTag: { fontSize: 12, fontWeight: 700, color: C.secondary, textTransform: "uppercase", letterSpacing: "0.8px", marginBottom: 12 },
    sectionH2: { fontSize: "clamp(26px, 4vw, 38px)", fontWeight: 800, color: C.primary, marginBottom: 12, letterSpacing: "-0.5px" },
    sectionSub: { fontSize: 16, color: "#6B7280", maxWidth: 540, lineHeight: 1.7, marginBottom: 44 },
    featCard: { background: "#fff", border: "1px solid #E5E7EB", borderRadius: 14, padding: "28px 24px" },
  };

  return (
    <div style={s.page}>
      <nav style={s.nav}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={s.logoBox}>B</div>

        </div>
        <div style={{ display: "flex", gap: 12 }}>
          <button type="button" onClick={() => open(false)} style={{ padding: "9px 20px", background: "transparent", color: C.primary, border: "1px solid #D1D5DB", borderRadius: 10, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Sign In</button>
          <button type="button" onClick={() => open(true)} style={{ ...s.btnGreen, padding: "9px 20px", fontSize: 14 }}>Get Started Free</button>
        </div>
      </nav>

      <section style={s.hero}>
        <div style={s.heroTag}>Construction Business Management</div>
        <h1 style={s.heroH1}>Build My Bill.<br />Run Your Business.</h1>
        <p style={s.heroSub}>Quotes, invoices, time tracking, jobs, equipment, inventory, and safety checks — all in one platform built for the trades.</p>
        <div style={{ display: "flex", gap: 14, justifyContent: "center", flexWrap: "wrap" }}>
          <button type="button" onClick={() => open(true)} style={s.btnGreen}>Get Started Free →</button>
          <button type="button" onClick={() => open(false)} style={s.btnGhost}>Sign In</button>
        </div>
        <div style={{ display: "flex", justifyContent: "center", gap: "clamp(24px, 5vw, 64px)", marginTop: 64, flexWrap: "wrap" }}>
          {[["20+", "Built-in modules"], ["∞", "Quotes & invoices"], ["$0", "Setup cost"], ["100%", "Your data"]].map(([n, l]) => (
            <div key={l} style={{ textAlign: "center" }}>
              <div style={{ fontSize: "clamp(28px, 4vw, 40px)", fontWeight: 900, color: C.secondary }}>{n}</div>
              <div style={{ fontSize: 13, opacity: 0.6, marginTop: 4 }}>{l}</div>
            </div>
          ))}
        </div>
      </section>

      <section style={s.section}>
        <div style={s.sectionTag}>Everything you need</div>
        <h2 style={s.sectionH2}>One platform. Every tool.</h2>
        <p style={s.sectionSub}>Stop juggling spreadsheets, paper logs, and separate apps. BuildMyBill puts your entire operation in one place.</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 24 }}>
          {FEATURES.map(ft => (
            <div key={ft.title} style={s.featCard}>
              <div style={{ fontSize: 32, marginBottom: 14 }}>{ft.icon}</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: C.primary, marginBottom: 8 }}>{ft.title}</div>
              <div style={{ fontSize: 14, color: "#6B7280", lineHeight: 1.7 }}>{ft.desc}</div>
            </div>
          ))}
        </div>

      <section style={{ ...s.sectionAlt, textAlign: "center" }}>

        <p style={{ ...s.sectionSub, margin: "0 auto 40px" }}>Add line items, apply tax rates, attach your logo, and print a PDF — without leaving the app.</p>
        <div style={{ background: C.primary, borderRadius: 16, padding: 32, maxWidth: 680, margin: "0 auto", textAlign: "left" }}>
          {[["Quote ID", "Q-2026-0041"], ["Client", "Prairie Land Developments"], ["Status", "Invoice"], ["Subtotal", "$14,250.00"], ["GST (5%)", "$712.50"], ["Total Due", "$14,962.50"]].map(([l, v], i) => (
            <div key={l} style={{ display: "flex", justifyContent: "space-between", gap: 12, padding: "10px 0", borderBottom: i < 5 ? "1px solid rgba(255,255,255,0.1)" : "none" }}>
              <span style={{ fontSize: 14, color: "rgba(255,255,255,0.5)" }}>{l}</span>

          <button type="button" onClick={() => open(true)} style={{ ...s.btnGreen, width: "100%", marginTop: 24 }}>Try It Free →</button>
        </div>
      </section>

      <section style={{ background: C.secondary, padding: "64px 5%", textAlign: "center" }}>
        <h2 style={{ fontSize: "clamp(24px, 4vw, 38px)", fontWeight: 900, color: "#fff", marginBottom: 16, letterSpacing: "-0.5px" }}>Ready to build your bill?</h2>
        <p style={{ fontSize: 16, color: "rgba(255,255,255,0.85)", maxWidth: 480, margin: "0 auto 32px" }}>Everything runs on your own computer — no server, no setup, no monthly bill to start.</p>
        <button type="button" onClick={() => open(true)} style={{ padding: "16px 40px", background: C.primary, color: "#fff", border: "none", borderRadius: 12, fontWeight: 800, fontSize: 16, cursor: "pointer" }}>Create Free Account →</button>

        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ ...s.logoBox, width: 28, height: 28, fontSize: 14 }}>B</div>
          <span style={{ fontWeight: 700, color: "rgba(255,255,255,0.8)" }}>BuildMyBill</span>
          <span style={{ fontSize: 14, opacity: 0.6 }}>— Humboldt, Saskatchewan</span>
        </div>
        <div style={{ fontSize: 14, opacity: 0.6 }}>© {new Date().getFullYear()} BuildMyBill. All rights reserved.</div>
      </footer>

      {showModal && (
        <div
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}
          onMouseDown={e => { if (e.target === e.currentTarget) setShowModal(false); }}
        >
          <div style={{ background: "#fff", borderRadius: 20, padding: 36, width: "100%", maxWidth: 420, position: "relative", maxHeight: "90vh", overflowY: "auto" }}>
            <button type="button" onClick={() => setShowModal(false)} style={{ position: "absolute", top: 16, right: 16, background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "#9CA3AF", lineHeight: 1 }}>×</button>
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 48, height: 48, borderRadius: 12, background: C.primary, fontSize: 22, fontWeight: 900, color: "#fff", marginBottom: 12 }}>B</div>
              <h2 style={{ fontSize: 22, fontWeight: 800, color: C.primary }}>{isRegister ? "Create your account" : "Welcome back"}</h2>
              <p style={{ fontSize: 13, color: "#9CA3AF", marginTop: 4 }}>{isRegister ? "Start your free 14-day trial" : "Sign in to your BuildMyBill account"}</p>

                      </button>
                    ))}
                  </div>

                  {joinMode ? (
                    <>
                      <Field label="Company Join Code" required>
                        <div style={{ display: "flex", gap: 8 }}>

                          <button type="button" onClick={verifyCode} disabled={verifying} style={{ ...s.btnGreen, padding: "9px 16px", fontSize: 13, whiteSpace: "nowrap" }}>{verifying ? "…" : "Verify"}</button>
                        </div>
                      </Field>
                      {codeCompany && (
                        <div style={{ background: "#F0FDF4", border: "1px solid #BBF7D0", color: "#166534", padding: "10px 14px", borderRadius: 8, marginBottom: 14, fontSize: 13 }}>

                        </div>
                      )}
                      <Field label="Your Name"><TextInput value={form.name} onChange={f("name")} placeholder="Full name" /></Field>
                    </>
                  ) : (
                    <>
                      <Field label="Your Name"><TextInput value={form.name} onChange={f("name")} placeholder="Full name" /></Field>
                      <Field label="Company Name" required><TextInput value={form.companyName} onChange={f("companyName")} placeholder="Acme Construction Ltd." /></Field>
                    </>
                  )}
                </>
              )}
              <Field label="Email" required><TextInput type="email" value={form.email} onChange={f("email")} placeholder="you@company.com" /></Field>
              <Field label="Password" required><TextInput type="password" value={form.password} onChange={f("password")} placeholder="••••••••" /></Field>
              <button type="submit" disabled={submitting} style={{ ...s.btnGreen, width: "100%", padding: 13, marginTop: 8, fontSize: 15, opacity: submitting ? 0.7 : 1, cursor: submitting ? "wait" : "pointer" }}>

              </button>
            </form>
            <p style={{ textAlign: "center", marginTop: 16, fontSize: 13, color: "#9CA3AF" }}>
              {isRegister ? "Already have an account? " : "Don't have an account? "}
              <button type="button" onClick={() => { setIsRegister(r => !r); setError(""); setInfo(""); }} style={{ background: "none", border: "none", color: C.secondary, cursor: "pointer", fontWeight: 700, fontSize: 13 }}>
                {isRegister ? "Sign In" : "Create one free"}
              </button>
            </p>
            <div style={{ marginTop: 16, padding: "10px 14px", background: "#F9FAFB", borderRadius: 8, fontSize: 12, color: "#9CA3AF", textAlign: "center", lineHeight: 1.6 }}>
              🔒 Your company's data is private and encrypted, isolated from every other company.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Sidebar & shell ────────────────────────────────────────────────────── */

  { id: "dashboard", label: "Dashboard", icon: "⊞" },
  { id: "quotes", label: "Quotes & Invoices", icon: "📄" },
  { id: "clients", label: "Clients", icon: "👥" },
  { id: "jobs", label: "Jobs / Projects", icon: "🏗️" },
  { id: "contracts", label: "Contracts", icon: "📋" },
  { id: "employees", label: "Employees", icon: "👤" },
  { id: "subcontractors", label: "Subcontractors", icon: "🔧" },
  { id: "time-entry", label: "Time Tracking", icon: "⏱️" },
  { id: "daily-log", label: "Daily Log", icon: "📝" },
  { id: "employee-logs", label: "Work Logs", icon: "📊" },
  { id: "manager-logs", label: "Manager Logs", icon: "📖" },
  { id: "equipment", label: "Equipment", icon: "🚛" },
  { id: "truck-logs", label: "Vehicle Logs", icon: "🚚" },
  { id: "safety", label: "Safety Checks", icon: "🦺" },
  { id: "inventory", label: "Inventory", icon: "📦" },
  { id: "warehouses", label: "Warehouses", icon: "🏭" },
  { id: "schedule", label: "Schedule", icon: "📅" },
  { id: "billing", label: "Billing & Reports", icon: "💰" },
  { id: "team", label: "Team", icon: "🧑‍🤝‍🧑" },
  { id: "subscriptions", label: "Subscriptions", icon: "💳" },
  { id: "settings", label: "Settings", icon: "⚙️" },
  { id: "profile", label: "Profile", icon: "👤" },
];

// Every signed-in member sees these; owner-only areas are admin.
const ALWAYS_VISIBLE = ["dashboard", "profile"];
const OWNER_ONLY = ["team", "settings", "subscriptions"];
// Nav items an owner can grant to employees (everything not always/owner-only).
const GRANTABLE = NAV.map(n => n.id).filter(id => !ALWAYS_VISIBLE.includes(id) && !OWNER_ONLY.includes(id));

function canAccess(navId, user) {
  if (!user) return false;
  if (user.isOwner) return true;                    // owner sees everything
  if (ALWAYS_VISIBLE.includes(navId)) return true;
  if (OWNER_ONLY.includes(navId)) return false;
  return !!(user.permissions && user.permissions[navId]);
}

function Sidebar({ open, onClose }) {
  const { page, navigate } = useRouter();
  const { company } = useCompany();
  const { logout, user } = useAuth();

  return (
    <>
      <div className={"sidebar-backdrop" + (open ? " open" : "")} onClick={onClose} />
      <aside className={"sidebar" + (open ? " open" : "")}>
        <div style={{ padding: "18px 16px", borderBottom: "1px solid rgba(255,255,255,0.1)", display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 32, height: 32, borderRadius: 8, background: C.secondary, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 800, flexShrink: 0 }}>B</div>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontWeight: 800, fontSize: 14, letterSpacing: "-0.3px", lineHeight: 1.2 }}>BuildMyBill</div>
            <div style={{ fontSize: 10, opacity: 0.55, lineHeight: 1.3, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {company?.companyName || "My Company"}
            </div>
          </div>
        </div>

        <nav style={{ flex: 1, padding: 8, overflowY: "auto" }}>
          {NAV.filter(item => canAccess(item.id, user)).map(item => {
            const active = page === item.id || (page === "quote-editor" && item.id === "quotes");
            return (
              <button
                type="button"
                key={item.id}
                onClick={() => { navigate(item.id); onClose(); }}
                style={{
                  width: "100%", display: "flex", alignItems: "center", gap: 8,
                  padding: "8px 10px", borderRadius: 7, border: "none", cursor: "pointer",
                  background: active ? "rgba(255,255,255,0.14)" : "transparent",
                  color: active ? "#fff" : "rgba(255,255,255,0.6)",
                  fontSize: 12.5, fontWeight: active ? 600 : 400,
                  marginBottom: 1, textAlign: "left",
                }}
              >
                <span style={{ fontSize: 13, flexShrink: 0 }}>{item.icon}</span>
                {item.label}
              </button>
            );
          })}
        </nav>

        <div style={{ padding: "12px 16px", borderTop: "1px solid rgba(255,255,255,0.1)" }}>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.45)", marginBottom: 6, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {user?.name || user?.email}
          </div>
          <button type="button" onClick={logout} style={{ width: "100%", padding: 6, background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 6, color: "rgba(255,255,255,0.7)", fontSize: 11, cursor: "pointer" }}>
            Sign Out
          </button>
        </div>
      </aside>
    </>
  );
}

const PAGES = {
  dashboard: () => <Dashboard />,
  quotes: () => <QuotesPage />,
  "quote-editor": () => <QuotesPage startNew />,
  clients: () => <ClientsPage />,
  jobs: () => <JobsPage />,
  contracts: () => <ContractsPage />,
  employees: () => <EmployeesPage />,
  subcontractors: () => <SubcontractorsPage />,
  "time-entry": () => <TimeEntryPage />,
  "daily-log": () => <DailyLogPage />,
  "employee-logs": () => <EmployeeLogsPage />,
  "manager-logs": () => <ManagerLogsPage />,
  equipment: () => <EquipmentPage />,
  "truck-logs": () => <TruckLogBooksPage />,
  safety: () => <SafetyPage />,
  inventory: () => <InventoryPage />,
  warehouses: () => <WarehousesPage />,
  schedule: () => <SchedulePage />,
  billing: () => <BillingPage />,
  subscriptions: () => <SubscriptionsPage />,

  settings: () => <SettingsPage />,

function FullScreenLoader({ label }) {
  return (
    <div style={{ position: "fixed", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 14, background: C.primary, color: "#fff", fontFamily: "system-ui, sans-serif" }}>
      <div style={{ width: 56, height: 56, borderRadius: 14, background: C.secondary, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, fontWeight: 800 }}>B</div>

function CenteredCard({ emoji, title, children }) {
  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24, background: C.bg }}>
      <div style={{ ...card, maxWidth: 460, width: "100%", textAlign: "center", padding: "36px 28px", marginBottom: 0 }}>
        <div style={{ fontSize: 44, marginBottom: 12 }}>{emoji}</div>
        <h1 style={{ fontSize: 22, fontWeight: 800, marginBottom: 10 }}>{title}</h1>

function PendingScreen() {
  const { user, logout, refresh } = useAuth();
  const [checking, setChecking] = useState(false);
  const check = async () => { setChecking(true); await refresh(); setChecking(false); };
  return (
    <CenteredCard emoji="⏳" title="Waiting for approval">
      <p style={{ color: C.textMuted, fontSize: 14, lineHeight: 1.7, marginBottom: 20 }}>
        Your request to join has been sent to the company owner. Once they approve you,
        you'll be able to sign in and see everything they've given you access to.
      </p>
      <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
        <button type="button" onClick={check} disabled={checking} style={btnSecondary}>{checking ? "Checking…" : "Check again"}</button>
        <button type="button" onClick={logout} style={btnOutline}>Sign out</button>
      </div>
      <div style={{ marginTop: 18, fontSize: 12, color: C.textMuted }}>Signed in as {user?.email}</div>
    </CenteredCard>
  );
}

function NoAccessScreen() {
  const { user, logout } = useAuth();
  return (
    <CenteredCard emoji="🔒" title="No access">
      <p style={{ color: C.textMuted, fontSize: 14, lineHeight: 1.7, marginBottom: 20 }}>
        This account isn't linked to a company (it may have been removed or declined).
        If you think this is a mistake, ask your company owner to re-invite you.
      </p>
      <button type="button" onClick={logout} style={btnOutline}>Sign out</button>
      <div style={{ marginTop: 18, fontSize: 12, color: C.textMuted }}>Signed in as {user?.email}</div>
    </CenteredCard>
  );
}

function AppShell() {
  const { page, navigate } = useRouter();
  const { user, isAuthenticated, pending, noAccess, ready, dataReady } = useAuth();
  const [menuOpen, setMenuOpen] = useState(false);
  const dataVersion = useDataVersion();

  useEffect(() => { setMenuOpen(false); }, [page]);

  if (!ready) return <FullScreenLoader label="Starting BuildMyBill…" />;
  if (!isAuthenticated) return <LoginPage />;
  if (noAccess) return <NoAccessScreen />;
  if (pending) return <PendingScreen />;
  if (!dataReady) return <FullScreenLoader label="Loading your company data…" />;

  const allowed = page === "pricing" ? true
    : page === "quote-editor" ? canAccess("quotes", user)
    : canAccess(page, user);
  const render = allowed ? (PAGES[page] || PAGES.dashboard) : null;
  const label = (NAV.find(n => n.id === page) || {}).label || "Dashboard";

  return (
    <div className="app">
      <Sidebar open={menuOpen} onClose={() => setMenuOpen(false)} />
      <div style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
        <div className="topbar">
          <button type="button" onClick={() => setMenuOpen(o => !o)} aria-label="Menu" style={{ background: "rgba(255,255,255,0.12)", border: "none", color: "#fff", fontSize: 18, borderRadius: 8, width: 36, height: 36, cursor: "pointer" }}>☰</button>
          <span style={{ fontWeight: 700, fontSize: 15 }}>{label}</span>
        </div>
        {/* key includes dataVersion so a rolled-back background write re-reads the store */}
        <main className="app-main" key={page + ":" + dataVersion}>
          {render
            ? render()
            : (
              <EmptyState
                icon="🔒"
                title="You don't have access to this section"
                subtitle="Your company owner controls which areas you can see. Ask them if you need access."
                action={<button type="button" onClick={() => navigate("dashboard")} style={btnSecondary}>Back to Dashboard</button>}
              />
            )}
        </main>
      </div>
    </div>
  );
}

/* ─── Error boundary ─────────────────────────────────────────────────────── */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("BuildMyBill error:", error, info); }
  render() {
    if (!this.state.error) return this.props.children;
    return (
      <div style={{ padding: 40, fontFamily: "system-ui, sans-serif", maxWidth: 640, margin: "0 auto" }}>
        <h1 style={{ fontSize: 22, fontWeight: 800, marginBottom: 12 }}>Something went wrong</h1>
        <pre style={{ background: "#FEF2F2", color: "#991B1B", padding: 16, borderRadius: 8, whiteSpace: "pre-wrap", fontSize: 13 }}>
          {String(this.state.error)}
        </pre>
        <button type="button" onClick={() => window.location.reload()} style={{ ...btnPrimary, marginTop: 16 }}>Reload App</button>
      </div>
    );
  }
}

function App() {
  return (
    <ErrorBoundary>
      <Router>
        <AuthProvider>
          <CompanyProvider>
            <AppShell />
          </CompanyProvider>
        </AuthProvider>
      </Router>
    </ErrorBoundary>
  );
}

const boot = document.getElementById("boot");
if (boot) boot.remove();
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
